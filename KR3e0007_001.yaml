body:
  text: 臟腑經絡先後病脈證第一論十三首脈證二條問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛故實脾則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經曰虛虛實實補不足損有餘是其義也餘藏準此夫人稟五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五臟元真通暢人即安和客氣邪風中人多死千般災難不越三條一者經絡受邪入臟腑為內所因也二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷以凡詳之病由都盡若人能養慎不令邪風干忤經絡適中經絡未流傳腑臟即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱苦酸辛甘不遺形體有衰病則無由入其腠理腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之文理也問曰病人有氣色見於面部願聞其說師曰鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死其目正圓者痊不治又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲師曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病師曰息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿唾沫師曰吸而微數其病在中焦實也當下之即愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治師曰寸口脈動者因其王時而動假令肝王色青四時各隨其色肝色青而反色白非其時色脈皆當病問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至也以得甲子而天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也師曰病人脈浮者在前其病在表浮者在後其病在裏腰痛背強不能行必短氣而極也問曰經云厥陽獨行何謂也師曰此為有陽無陰故稱厥陽問曰寸脈沉大而滑沉則為實滑則為氣實氣相傳血氣入臟即死入腑即愈此為卒厥何謂也師曰唇口青身冷為入臟即死如身和汗自出為入腑即愈問曰脈脫入臟即死入腑即愈何謂也師曰非為一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入裏者即死問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰咳上氣喘噦咽腸鳴脹滿心痛拘急五藏病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中裏䅽飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡問曰病有急當救裏救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救裏後身體疼痛清便自調者急當救表也夫病痼疾加以卒病當先治其卒病後乃治其痼疾也師曰五臟病各有所得者愈五臟病各有所惡各隨其所不喜者為病病者素不應食而反暴思之必發熱也夫諸病在臟欲攻之當隨其所得而攻之如渴者與豬苓湯餘皆倣此豬苓湯方豬苓去皮澤瀉茯苓阿膠滑石碎各一兩右五味以水四升先煮四味取二升去滓內阿膠癢消盡溫服七合日三服
