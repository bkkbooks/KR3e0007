body:
  text: 痓濕暍病脈證治第二論一首脈證十二條方十一首太陽病發熱無汗反惡寒者名曰剛痓太陽病發熱汗出而不惡寒名曰柔痓太陽病發熱脈沉而細者名曰痓為難治太陽病發汗太多因致痓夫風病下之則痓復發汗必拘急瘡家雖身疼痛不可發汗汗出則痓病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痓病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇暴腹脹大者為欲解脈如故反伏弦者痓夫痓脈按之緊如弦直上下行痓病有灸瘡難治脈經云痓家其脈伏堅直上下太陽病其證備身體強几几然脈反沉遲此為痓括樓桂枝湯主之括蔞桂枝湯方括蔞根二兩桂枝三兩芍藥三兩甘草二兩生姜三兩大棗十二枚右六味以水九升煮取三升分溫三服取微汗汗不出食頃啜熱粥發之太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痓葛根湯主之葛根湯方葛根四兩麻黃三兩去節桂二兩去皮芍藥二兩甘草二兩炙生姜三兩大棗十二枚右七味㕮咀以水一升先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服乙升覆取微似汗不須啜粥餘如桂枝湯法將息及禁忌痓為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合右四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一二沸分溫再服得下止服太陽病關節疼痛而煩脈沉而細者此名濕痹濕痺之候小便不利大便反快但當利其小便濕家之為病一身盡疼發熱身色如熏黃也濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利舌上如胎者以丹田有熱胸上有寒渴欲得飲而不能飲則口燥煩也濕家下之額上汗出微喘小便利者死若下利不止者亦死風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲出汗者風濕俱去也濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之麻黃加朮湯方麻黃三兩去節桂枝二兩去皮甘草二兩炙杏仁七十箇去皮尖白朮四兩右五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯麻黃杏仁薏苡甘草湯方麻黃去節半兩湯泡甘草一兩炙薏苡仁半兩杏仁十箇去皮尖炒右剉麻豆大每服四錢匕水盞半煮八分去滓溫服有微汗避風風濕脈浮身重汗出惡風者防己黃耆湯主之防己黃耆湯方防己一兩甘草半兩炒白朮七錢半黃耆一兩一分去蘆右剉麻豆大每抄五錢七生姜四片大棗一枚水盞半煎八分去滓溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如虫行皮中從腰下如冰後坐被上又以一被繞腰以下溫令微汗差傷寒八九日風濕相搏身體疼痛不能自轉側不嘔不渴脈浮虛而濇者桂枝附子湯主之若大便堅小便自利者去桂加白朮湯主之桂枝附子湯方桂枝四兩去皮生姜三兩切附子三枚炮去皮破八片甘草二兩炙大棗十二枚擘右五味以水六升煮取二升去滓分溫三服白朮附子湯方白朮二兩附子一枚半炮去皮甘草一兩炙生姜一兩半切大棗六枚右五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附竝走皮中逐水氣未得除故耳風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草附子湯方甘草二兩炙附子二枚炮去皮白朮二兩桂枝四兩去皮右四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者服六七合為妙太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口前開板齒燥若發其汗則其惡寒甚加溫針則發熱甚數下之則淋甚太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之白虎人參湯方知母六兩石膏一斤碎甘草二兩粳米六合人參三兩右五味以水一斗煮米熱湯成去滓溫服一升日三服太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物苽蒂湯主之一物苽蒂湯方苽蒂二七個右剉以水一升煮取五合去滓頓服
