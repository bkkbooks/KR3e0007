body:
  text: 瘧病脈證并治第四證二條方六首師曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之病瘧以月一日發當以十五日愈設不差當月盡解如其不差當云何師曰此結為癥瘕名曰瘧母急治之宜鱉甲煎丸鱉甲煎丸方鱉甲十二分炙烏扇三分燒黃芩三分柴胡六分鼠婦三分熬乾姜二分大黃三分芍藥五分桂枝三分葶藶一分熬石韋三分去毛厚朴三分牡丹五分去心瞿麥二分紫威三分半夏一分人參一分䗪蟲五分熬阿膠三分炙蜂窠四分炙赤消十二分蜣蜋六分熬桃仁二分右二十三味為末取鍛竈下灰一斗清酒一斛五斗浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥煎為丸如梧子大空心服七丸日三服師曰陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消鑠肌肉溫瘧者其脈如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯主之白虎加桂枝湯方知母六兩甘草二兩炙石膏一斤粳米二合桂去皮三兩右銼每五錢水一盞半煎至八分去滓溫服汗出即愈瘧多寒者名曰牡瘧蜀漆散主之蜀漆散方蜀漆洗去腥雲母燒二日夜龍骨等分右三味杵為散未發前以漿水服半錢溫瘧加蜀漆半分臨發時服一錢七附外臺祕要方牡蠣湯治牡瘧牡蠣四兩熬麻黃去節四兩甘草二兩蜀漆三兩右四味以水八升先煮蜀漆麻黃去上沫得六升內諸藥煮取二升溫服一升若吐則勿更服柴胡去半夏加括蔞湯治瘧病發渴者亦治勞瘧柴胡八兩人參黃芩甘草各三兩括蔞根四兩生姜二兩大棗十二枚右七味以水一斗二升煮取六升去滓再煎取三升溫服一升日二服柴胡桂薑湯治瘧寒多微有熱或但寒不熱柴胡半斤桂枝三兩去皮乾姜二兩括蔞根四兩黃芩三兩牡蠣三兩熬甘草二兩炙右七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈
