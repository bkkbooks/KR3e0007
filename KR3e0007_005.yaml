body:
  text: 中風歷節病脈證并治第五論一首脈證三條方十二首夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎侯氏黑散治大風四肢煩重心中惡寒不足者菊花四十分白朮十分細辛三分茯苓三分牡蠣三分桔梗八分防風十分人參三分礬石三分黃芩五分當歸三分乾薑三分芎藭三分桂枝三分右十四味杵為散酒服方寸七日一服初服二十日溫酒調服禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力寸口脈遲而緩遲則為寒緩則為虛榮緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣風引湯除熱癱蜣大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩右十二味杵粗篩以韋囊盛之取三指撮井花水三升煮三沸溫服一升防己地黃湯治病如狂狀妄行獨語不休無寒熱其脈浮防己一錢桂枝三錢防風三錢甘草一錢右四味以酒一杯漬之一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服頭風摩散方大附子一枚炮鹽等分右二味為散沐了以方寸匕已摩疾上令藥力行寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節黃汗出故曰歷節跌陽脈浮而滑滑則穀氣實浮則汗自出少陰脈浮而弱弱則血不足浮則為風風血相搏即疼痛如掣盛人脈澀小短氣汗出歷節疼不可屈伸此皆飲酒汗出當風所致諸肢節疼痛身體癇羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之桂枝芍藥知母湯方桂枝四兩芍藥三兩甘草二兩麻黃二兩生薑五兩白朮五兩知母四兩防風四兩附子二兩炮右九味以水七升煮取二升溫服七合日三服味酸則傷筋筋傷則緩名曰泄鹹則傷骨骨傷則痿名曰枯枯泄相搏名曰斷泄榮氣不通衛不獨行榮衛俱微三焦無所御四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也病歷節不可屈伸疼痛烏頭湯主之烏頭湯方治腳氣疼痛不可屈伸麻黃芍藥黃氐各三兩甘草三兩炙川烏五枚㕮咀以蜜二升煎取一升即出烏頭右五味㕮咀四味以水三升煮取一升去滓內蜜煎中更煎之服七合不知盡服之礬石湯治腳氣沖心礬石二兩右一味以漿水一斗五升煎三五沸浸腳良附方古今録驗續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側麻黃桂枝當歸人參石膏乾薑甘草各三兩芎藭一兩五錢杏仁四十枚右九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風并治但伏不得臥咳逆上氣面目浮腫千金三黃湯治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食麻黃五錢獨活四錢細辛二錢黃茋二錢黃芩三錢右五味以水六升煮取二升分溫三服一服小汗二服大汗心熱加大黃二錢腹滿加枳實一枚氣逆加人參三錢悸加牡蠣三錢渴加括蔞根三錢先有寒加附子一枚近效方朮附湯治風虛頭重眩苦極不知食味暖肌補中益精氣白朮二兩附子一枚半炮去皮甘草一兩炙右三味銼每五錢七薑五片棗一枚水盞半煎七分去滓溫服崔氏八味丸治腳氣上入小腹不仁乾地黃八兩山茱萸署蕷各四兩澤瀉茯苓牡丹皮各三兩桂枝附子炮各一兩右八味末之煉蜜和丸梧子大酒下十五丸日再服千金方越婢加朮湯治肉極熱則身體津脫腠理開汗大泄厲風氣下焦腳弱麻黃六兩石膏半斤生薑三兩甘草二兩白朮四兩大棗十五枚右六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風加附子一枚炮
