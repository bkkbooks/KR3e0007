body:
  text: 血痹虛勞病脈證并治第六論一首脈證九條方九首問曰血痺病從何得之師曰夫尊榮人骨弱肌膚盛重困疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈血痺陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之黃耆桂枝五物湯方黃耆三兩芍藥三兩桂枝三兩生姜六兩大棗十二枚右五味以水六升煮取二升溫服七合日三服夫男子平人脈大為勞極虛亦為勞男子面色薄者主渴及亡血卒喘悸脈浮者裏虛也男子脈虛沉弦無寒熱短氣裏急小便不利面色白時目瞑兼衄小腹滿此為勞使之然勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸削不能行男子脈浮弱而澀為無子精氣清冷夫失精家小腹弦急陰頭寒目眩髮落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之桂枝加龍骨牡蠣湯方桂枝芍樂生姜各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩右七味以水七升煮取三升分溫三服天雄散方天雄三兩炮白朮八兩桂枝六兩龍骨三兩右四味杵為散酒服半錢七日三服不知稍增之男子平人脈虛弱細微者善盜汗也人年五六十其病脈大者痹俠背行若腸鳴馬刀俠癭者皆為勞得之脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半産漏下男子則亡血失精虛勞裏急悸衄腹中痛夢失精四肢痠痛手足煩熱咽乾口燥小建中湯主之小建中湯方桂枝三兩去皮甘草三兩炙大棗十二枚芍藥八兩生姜二兩膠飴一升右六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服虛勞裏急諸不足黃耆建中湯主之虛勞腰痛少腹拘急小便不利者八味腎氣丸主之虛勞諸不足風氣百疾薯蕷丸主之薯蕷丸方薯蕷三十分當歸桂枝麯乾地黃豆黃卷各十分甘草二十八分人參七分芎藭芍藥白朮麥門冬杏仁各六分柴胡桔梗茯苓各五分阿膠七分乾姜三分白斂二分防風六分大棗百枚為膏右二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑虛勞虛煩不得眠酸棗湯主之酸棗湯方酸棗仁一升甘草一兩知母二兩茯苓二兩芎藭二兩右五味以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷饑傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之大黃䗪蟲丸方大黃十分蒸黃芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾地黃十兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升䗪蟲半升右十二味末之煉蜜和丸小豆大酒飲服五丸日三服附方千金翼炙甘草湯治虛勞不足汗出而悶脈結悸行動如常不出百日危急者十一日死甘草四兩炙桂枝生姜各三兩麥門冬半斤麻仁半斤人參阿膠各二兩大棗三十枚生地黃一斤右九味以酒七升水八升先煮八味取三升去滓內膠消盡溫服一升日三服肘後獺肝散治冷勞又主鬼疰一門相染獺肝一具炙乾末之水服方寸匕日三服
