body:
  text: 肺痿肺癰欬嗽上氣病脈證治第七論三首脈證四條方十五首問曰熱在上焦者因欬為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口脈數其人欬口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥欬即胸中隱隱痛脈反滑數此為肺癰欬唾濃血脈數虛者為肺痿數實者為肺癰問曰病欬逆脈之何以知此為肺癰當有膿血吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則欬口乾喘滿咽燥不渴時唾濁沫時時振寒熱之所過血為之凝滯畜結癰膿吐如米粥始萌可捄膿成則死上氣面浮腫肩息其脈浮大不治又加利尤甚上氣喘而躁者屬肺脹欲作風水發汗則愈肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾姜湯以溫之若服湯已渴者屬消渴甘草乾姜湯方甘草四兩炙乾姜二兩炮右㕮咀以水三升煮取一升五合去滓分溫再服欬而上氣喉中水雞聲射干麻黃湯主之射干麻黃湯方射干十三枚一法三兩麻黃四兩生姜四兩細辛紫苑款冬花各三兩五味子半升大棗七枚半夏大者洗八枚一法半升右九味以水一斗二升先煮麻黃兩沸去上沫內諸藥煮取三升分溫三服欬逆上氣時時唾濁但坐不得服皂莢丸主之皂莢丸方皂莢八兩刮去皮用酥炙右一味末之蜜丸梧子大以棗膏和湯服三丸日三夜一服欬而脈浮者厚朴麻黃湯主之厚朴麻黃湯方厚朴五兩麻黃四兩石膏如雞子大杏仁半升半夏半升乾姜二兩細辛二兩小麥一升五味子半升右九味以水一斗二升先煮小麥熱去滓內諸藥煮取三升溫服一升日三服脈沉者澤漆湯主之澤漆湯方半夏半升紫參五兩澤漆三斤以東流水五斗煮取一斗五升生姜五兩白前五兩甘草黃芩人參桂枝各三兩右九味㕮咀內澤漆汁中煮取五升溫服五合至夜盡大逆上氣咽喉不利止逆下氣者麥門冬湯主之麥門冬湯方麥門冬七升半夏一升人參二兩甘草二兩粳米三合大棗十二枚右六味以水一斗二升煮取六升溫服一升日三夜一服肺癰喘不得臥葶藶大棗瀉肺湯主之葶藶大棗瀉肺湯方葶藶炙令黃色搗丸如彈丸大大棗十二枚右先以水三升煮棗取二升去棗內葶藶煮取一升頓服欬而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之桔梗湯方桔梗一兩甘草二兩右二味以水三升煮取一升分溫再服則吐膿血也欬而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之越婢加半夏湯方麻黃六兩石膏半斤生姜三兩大棗十五枚甘草二兩半夏半升右六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服肺脹欬而上氣煩燥而喘脈浮者心下有水小青龍加石膏湯主之小青龍加石膏湯方麻黃芍藥桂枝細辛甘草乾姜各三兩五味子半夏各半升石膏二兩右九味以水一斗先煮麻黃去上沫內諸藥煮取三升強人服一升羸者減之日三服小兒服四合附方外臺炙甘草湯治肺痿涎唾多心中溫溫液液者千金甘草湯甘草右一味以水三升煮減半分溫三服千金生姜甘草湯治肺痿欬唾涎沫不止咽燥而渴生姜五兩人參二兩甘草四兩大棗十五枚右四味以水七升煮取三升分溫三服千金桂枝去芍藥加皂莢湯治肺痿吐涎沫桂枝生姜各三兩甘草二兩大棗十枚皂莢二枚去皮子炙焦右五味以水七升微微火煮取三升分溫三服外臺桔梗白散治欬而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗貝母各三分巴豆一分去皮熬研如脂右三味為散強人飲服半錢七羸者減之病在膈上者吐膿血膈下者瀉出若下多不止飲冷水一盃則定千金葦莖湯治欬有微熱煩滿胸中甲錯是為肺癰葦莖二升薏苡仁半升桃仁五十枚瓜瓣半升右四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛欬逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之
