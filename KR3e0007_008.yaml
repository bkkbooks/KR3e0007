body:
  text: 奔豚氣病脈證治第八論二首方三首師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之師曰奔豚病從小腹起上衝咽喉發作欲死復還止皆從驚恐得之奔豚氣上衝胸腹痛往來寒熱奔豚湯主之奔豚湯方甘草芎藭當歸各二兩半夏四兩黃芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升右九味以水二斗煮取五升溫服一升日三夜一服發汗後燒針令其汗針處被寒核起而赤者必發賁豚氣從小腹上至心灸其核上各一壯與桂枝加桂湯主之桂枝加桂湯方桂枝五兩芍藥三兩甘草三兩炙生薑三兩大棗十二枚右五味以水七升微火煮取三升去滓溫服一升發汗後臍下悸者欲作賁豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤甘草二兩炙大棗十五枚桂枝四兩右四味以甘爛水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服
