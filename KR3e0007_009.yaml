body:
  text: 胸痺心痛短氣病脈證治第九論一首脈證一條方十首師曰夫脈當取太過不及陽微陰弦即胸痺而痛所以然者責其極虛也今陽虛知在上焦所以胸痺心痛者以其陰弦故也平人無寒熱短氣不足以息者實也胸痺之病喘息欬唾胸背痛短氣寸口脈沉而遲關上小緊數用後方主之括蔞薤白白酒湯方括蔞實一枚搗薤白半斤白酒七升右三味同煮取二升分溫再服胸痺不得臥心痛徹背者括蔞薤白半夏湯主之括蔞薤白半夏湯方括蔞實一枚搗薤白三兩半夏半斤白酒一斗右四味同煮取四升溫服一升日三服胸痺心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之枳實薤白桂枝湯方枳實四枚厚朴四兩薤白半斤桂枝一兩括蔞實一枚搗右五味以水五升先煮枳實厚朴取一升去滓內諸藥煮數沸分溫三服人參湯方人參甘草乾姜白朮各三兩右四味以水八升煮取三升溫服一升日三服胸痺胸中氣塞短氣茯苓杏仁甘草湯主之橘枳姜湯亦主之茯苓杏仁甘草湯方茯苓三兩杏仁五十箇甘草一兩右三味以水一斗煮取五升溫服一升日三服不差更服橘枳姜湯方橘皮一斤枳實三兩生姜半斤右三味以水五升煮取二升分溫再服胸痺緩急者用後方主之薏苡附子散方薏苡仁十五兩大附子十枚炮右二味杵為散服方寸匕日三服心中痞諸逆心懸痛桂枝生姜枳實湯主之桂姜枳實湯方桂枝生姜各三兩枳實五枚右三味以水六升煮取三升分溫三服心痛徹背背痛徹心烏頭赤石脂丸主之赤石脂丸方蜀椒一兩一法二分烏頭一分炮附子半兩炮一法一分乾姜一兩一法一分赤石脂一兩一法二分右五味末之蜜丸如梧子大先食服一丸日三服不知稍加服九痛丸治九種心痛附子三兩炮生狼牙一兩炙香巴豆一兩去皮心熬研如脂人參乾姜吳茱萸各一兩右六味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷腫上氣落馬墜車血疾等皆主之忌口如常法
