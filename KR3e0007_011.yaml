body:
  text: 五臟風寒積聚病脈證并治第十一論二首脈證十七條方二首肺中風者口燥而喘身運而重冒而腫脹肺中寒吐濁涕肺死臟浮之虛按之弱如葱葉下無根者死肝中風者頭目瞤兩脅痛行常傴令人嗜甘肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也肝死臟浮之弱按之如索不來或曲如蛇行者死肝著其人常欲蹈其胸上先未苦時但欲飲熱旋復花湯主之心中風者翕翕發熱不能起心中饑食即嘔吐心中寒者其人苦病心如噉蒜狀劇者心痛徹背背痛徹心譬如蠱注其脈浮者自吐乃愈心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心臟傷所致也心死臟浮之實如麻豆按之益躁疾者死邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲陽氣衰者為狂脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣脾死臟浮之大堅按之如覆杯潔潔狀如搖者死趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約麻子仁丸主之麻子仁丸方麻子仁二升芍藥半斤枳實一斤大黃一斤厚朴一尺杏仁一升右六味末之煉蜜和丸梧子大飲服十丸日三以知為度腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣裏冷濕久久得之腰以下冷痛腹重如帶五千錢甘姜苓朮湯主之甘草乾姜茯苓白朮湯方甘草白朮各二兩乾姜茯苓各四兩右四味以水五升煮取三升分溫三服腰中即溫腎死臟浮之堅按之亂如轉丸益下入尺中者死問曰三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消穀故能噫耳下焦竭即遺溺失便其氣不和不能自禁制不須治久則愈師曰熱在上焦者因咳為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋祕不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔問曰病有積有聚有䅽氣何謂也師曰積者藏病也終不移聚者府病也發作有時展轉痛移為可治䅽氣者脅下痛按之則愈復發為䅽氣諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍傍上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之
