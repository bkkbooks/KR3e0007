body:
  text: 痰飲咳嗽病脈證并治第十二論一首脈證二十一條方十九首問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息短氣不得臥其形如腫謂之支飲水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸夫心下有留飲其人背寒冷如掌大留飲者脅下痛引缺盆咳嗽則輒已胸中有留飲其人短氣而渴四肢歷節痛脈沉者有留飲膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後虛脈偏弦者飲也肺飲不弦但苦喘短氣支飲亦喘而不能臥加短氣其脈平也病痰飲者當以溫藥和之心下有痰飲胸脅支滿目胘用後方茯桂甘白湯方茯苓四兩桂枝白朮各三兩甘草二兩右四味以水六升煮取三升分溫三服小便則利夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之甘遂半夏湯方甘遂大者三枚半夏十二枚以水一升煮取半升去滓芍藥五枚甘草如指大一枚炙右四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之脈浮而細滑傷飲脈弦數有寒飲冬夏難治脈沉而弦者懸飲內痛病懸飲者十棗湯主之十棗湯方芫花熬甘遂大戟各等分右三味搗篩以水一升五合先煮肥大棗十枚取九合去滓內藥末強人服一錢匕羸人服半錢平旦溫服之不下者明日更加半錢得快下後糜粥自養病溢飲者當發其汗大青龍湯主之小青龍湯亦主之大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十箇去皮尖生姜三兩大棗十二枚石膏如雞子大研右七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗多者溫粉粉之小青龍湯方麻黃去節三兩芍藥三兩五味子半斤乾姜三兩甘草三兩炙細辛三兩桂枝三兩去皮半夏半升湯洗右八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升膈間支飲其人喘滿心下痞堅面色墨黑其脈沉緊得之數十日醫吐下之不愈朮防己湯主之虛者即愈實者三日復發復與不愈者宜朮防己湯去石膏加茯苓芒硝湯主之朮防己湯方朮防己三兩石膏十二枚雞子大桂枝二兩人參四兩右四味以水六升煮取二升分溫再服朮防己加茯苓芒硝湯方朮防己桂枝各二兩人參芒硝三合茯苓各四兩右五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈心下有支飲其人苦冒眩澤瀉湯主之澤瀉湯方澤瀉五兩白朮二兩右二味以水二升煮取一升分溫再服支飲胸滿者厚朴大黃湯主之厚朴大黃湯方厚朴一尺大黃六兩枳實四兩右三味以水五升煮取二升分溫再服支飲不得息葶藶大棗瀉肺湯主之嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之小半夏湯方半夏一升生姜半斤右二味以水七升煮取一升半分溫再服腹滿口舌乾燥此腸間有水氣己椒藶黃丸主之防椒葶黃丸方防己椒目葶藶熬大黃各一兩右四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之小半夏加茯苓湯方半夏一升生姜半斤茯苓三兩一法四兩右三味以水七升煮取一升五合分溫再服假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散主之五苓散方澤瀉一兩一分豬苓三分去皮茯苓三分白朮三分桂枝二分去皮右五味為末白飲服方寸匕日三服多飲暖水汗出愈附方外臺茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食茯苓人參白朮各三兩枳實二兩橘皮二兩半生姜四兩右六味水六升煮取一升八合分溫三服如人行八九里進之咳家其脈弦為有水十棗湯主之夫有支飲家咳煩胸中痛者不卒死至一百日或一歲宜十棗湯久咳數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家咳逆倚息不得臥小青龍湯主之青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痺其面翕然熱如醉狀因復下流陰股小便難時復冒者與茯苓桂枝五味甘草湯治其氣衝桂苓五味甘草湯方茯苓四兩桂枝四兩去皮甘草炙三兩五味子半升右四味以水八升煮取三升去滓分三溫服衝氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾姜細辛以治其咳滿苓甘五味姜辛湯方茯令四兩甘草乾姜細辛各三兩五味子半升右五味以水八升煮取三升去滓溫服半升日三服咳滿即止而更復渴衝氣復發者以細辛乾姜為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水桂苓味甘去桂四姜辛夏湯方茯苓四兩甘草細辛乾姜各二兩五味子半夏各半升右六味以水八升煮取三升去滓溫服半升日三服水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痺故不內之若逆而內之者必厥所以然者以其人血虛麻黃發其陽故也苓甘五味加薑辛半夏杏仁湯方茯苓四兩甘草三兩五味子半升乾姜三兩細辛三兩半夏半升杏仁半升去皮尖右七味以水一斗煮取三升去滓溫服半升日三服若面熱如醉此為胃熱上衝熏其面加大黃以利之茯甘姜味辛夏仁黃湯茯苓四兩甘草三兩五味子半升乾姜三兩細辛三兩半夏半升杏仁半升大黃三兩右八味以水一斗煮取三升去滓溫服半升日三服先渴後嘔為水停心下此屬飲家小半夏茯苓湯主之
