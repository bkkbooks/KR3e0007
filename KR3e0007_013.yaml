body:
  text: 消渴小便利淋病脈證并治第十三脈證九條方六首厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐蛔下之不肯止寸口脈浮而遲浮即為虛遲即為勞虛則衛氣不足勞則榮氣竭趺陽脈浮而數浮即為氣數即消穀而大堅氣盛則溲數溲數即堅堅數相搏即為消渴男子消渴小便反多以飲一斗小便一斗腎氣丸主之脈浮小便不利微熱消渴者宜利小便發汗五苓散主之渴欲飲水水入則吐者名曰水逆五苓散主之渴欲飲水不止者文蛤散主之文蛤散方文蛤四兩右一味杵為散以沸湯五合和服方寸匕淋之為病小便如粟狀小腹弦急痛引臍中趺陽脈數胃中有熱即消穀引食大便必堅小便即數淋家不可發汗發汗則必便血小便不利者有水氣其人苦渴用括蔞瞿麥丸主之括蔞瞿麥丸方括蔞根二兩茯苓薯蕷各三兩附子一枚炮瞿麥一兩右五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之蒲灰散方蒲灰七分滑石二分右二味杵為散飲服方寸匕日三服滑石白魚散方滑石二分亂髮二分燒白魚二分右三味杵為散飲服半錢匕日三服茯苓戎鹽湯方茯苓半斤白朮二兩戎鹽彈丸大一枚右三味先將茯苓白朮煎成入戎鹽再煎分溫三服渴欲飲水口乾舌燥者白虎加人參湯主之脈浮發熱渴欲飲水小便不利者豬苓湯主之豬苓湯方豬苓去皮茯苓阿膠滑石澤瀉各一兩右五味以水四升先煮四味取二升去滓內膠洋消溫服七合日三服
