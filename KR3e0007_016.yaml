body:
  text: 驚悸吐衄下血胸滿瘀血病脈證治第十六脈證十二條方五首寸口脈動而弱動即為驚弱則為悸師曰夫脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止又曰從春至夏衄者太陽從秋至冬衄者陽明衄家不可汗汗出必額上陷脈緊急直視不能眴不得眠病人面無血色無寒熱脈沉弦者衄浮弱手按之絕者下血煩欬者必吐血夫吐血欬逆上氣其脈數而有熱不得臥者死夫酒客欬者必致吐血此因極飲過度所致也寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相擊此名曰革婦人則半產漏下男子則亡血亡血不可發其表汗出則寒慄而振病人胸滿唇痿舌青口燥但欲嗽水不欲嚥無寒熱脈微大來遲腹不滿其人言我滿為有瘀血病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之火邪者桂枝去芍藥加蜀漆牡蠣龍骨捄逆湯主之桂枝捄逆湯方桂枝二兩去皮甘草三兩炙生姜六兩牡蠣五兩熬龍骨四兩大棗十二枚蜀漆三兩洗去腥右為末以水一斗二升先煮蜀漆減二升內諸藥後取三升去滓溫服一升心下悸者半夏麻黃丸主之半夏麻黃丸方半夏麻黃等分右二味末之煉蜜和丸小豆大飲服三丸日三服吐血不止者後湯主之柏葉湯方柏葉乾姜各三兩艾三把右三味以水五升取馬通汁一升合煮取一升分溫再服下血先便後血此遠血也黃土湯主之黃土湯方甘草乾地黃白朮附子炮阿膠黃芩各三兩竈中黃土半斤右七味以水八升煮取三升分溫二服下血先血後便此近血也赤小豆當歸散主之心氣不足吐血衄血用後方瀉心湯方大黃二兩黃連黃芩各一兩右三味以水三升煮取一升頓服之
