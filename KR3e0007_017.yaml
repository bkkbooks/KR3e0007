body:
  text: 嘔吐噦下利病脈證治第十七論一首脈證二十七條方二十三首夫嘔家有癰膿不可治嘔膿盡自愈先嘔卻渴者此為欲解先渴卻嘔者為水停心下此屬飲家嘔家本渴今反不渴者以心下有支飲故也此屬支飲問曰病人脈數數為熱當消穀引食而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷趺陽脈浮而澀浮則為虛虛則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治病人欲吐者不可下之噦而腹滿視其前後知何部不利利之即愈嘔而胸滿者用後方茱萸湯方吳茱萸一升人參三兩生薑六兩大棗十二枚右四味以水五升煮取三升溫服七合日三服乾嘔吐涎沫頭痛者茱萸湯主之嘔而腸鳴心下痞者用後方半夏瀉心湯方半夏半升洗黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草三兩炙右七味以水一斗煮取六升去滓再煮取三升溫服一升日三服乾嘔而利者用後方黃芩加半夏生薑湯方黃芩三兩甘草二兩炙芍藥三兩半夏半斤生薑四兩大棗二十枚右六味以水一斗煮取三升去滓溫服一升日再夜一服諸嘔吐穀不得下者小半夏湯主之嘔吐而病在膈上後思水者解急與之思水者用後方豬苓散方豬苓茯苓白朮各等分右三味杵為散飲服方寸匕日三服嘔而脈弱小便復利身有微熱見厥者難治用後方四逆湯方附子七箇生用乾薑一兩半甘草二兩炙右三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩嘔而發熱者用後方小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草二兩半夏半斤生薑三兩大棗十二枚右七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服胃反嘔吐者大半夏湯主之大半夏湯方半夏二升洗完用人參三兩白蜜一升右三味以水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升餘分再服食已即吐者用後方大黃甘草湯方大黃四兩甘草一兩右二味以水三升煮取一升分溫再服胃反吐而渴欲飲水者用後方茯苓澤瀉湯方茯苓半斤澤瀉四兩甘草二兩桂枝二兩白朮三兩生薑四兩右六味以水一斗煮取三升內澤瀉再煮取二升半溫服八合日三服吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛文蛤湯方文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十箇大棗十二枚右七味以水六升煮取二升溫服一升汗出即愈乾嘔吐逆吐涎沫用後方半夏乾薑散方半夏乾薑各等分右二味杵為散取方寸匕漿水一升半煎取七合頓服之病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憤憤然無奈者用後方生薑半夏湯方半夏半斤生薑汁一升右二味以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一服止停後服乾嘔噦若手足厥者橘皮湯主之橘皮湯方橘皮四兩生薑半斤右二味以水七升煮取三升溫服一升下咽即愈噦逆者橘皮竹茹湯主之橘皮竹茹湯方橘皮二升竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩右六味以水一斗煮取三升溫服一升日三服夫六府氣絶於外者手足寒上氣腳縮五臟氣絶於內者利不禁下甚者手足不仁下利脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也下利有微熱而渴脈弱者今自愈下利脈數有微熱汗出今自愈設脈緊為未解下利脈數而渴者今自愈設不差必清膿血以有熱故也下利脈反弦發熱身汗者自愈下利氣者當利其小便下利寸脈反浮數尺中自澀者必清膿血下利清穀不可攻其表汗出必脹滿下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微熱所以然者其面戴陽下虛故也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯四逆湯方桂枝湯方桂枝三兩去皮芍藥三兩甘草三兩炙生薑三兩大棗十二枚右五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜稀粥一升已助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水淋漓若一服汗出病差停後服下利三部脈皆平按之心下堅者急下之宜大承氣湯下利脈遲而滑者實也利未欲止急下之宜大承氣湯下利脈反滑者當有所去下乃愈宜大承氣湯下利已差至其年月日時復發者以病不盡故也當下之宜大承氣湯大承氣湯方下利譫語者有燥屎也小承氣湯主之小承氣湯方大黃四兩厚朴二兩炙枳實大者三枚炙右三味以水四升煮取一升二合去滓分溫二服得利則止下利便膿血者桃花湯主之桃花湯方赤石脂一升一半銼一半篩末乾薑一兩粳米一升右三味以水七升煮米令熟去滓溫七合內赤石脂末方寸匕日三服若一服愈餘勿服熱利重下者白頭翁湯主之白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩右四味以水七升煮取二升去滓溫服一升不愈更服下利後更煩桉之心下濡者為虛煩也梔子豉湯主之梔子豉湯方梔子十四枚香豉四合綿裹右二味以水四升先煮梔子得二升半內豉煮取一升半去滓分二服溫進一服得吐則止下利清穀裏寒外熱汗出而厥者通脈四逆湯主之通脈四逆湯方附子大者一枚生用乾薑三兩強者四兩甘草二兩炙右三味以水三升煮取一升一合去滓分溫再服下利肺痛紫參湯主之紫參湯方紫參半斤甘草三兩右二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服氣利訶梨勒散主之訶梨勒散方訶梨勒十枚煨右一味為散粥飲和頓服附方千金翼小承氣湯治大便不通噦數譫語外臺黃芩湯治乾嘔下利黃芩人參乾薑各三兩桂枝一兩大棗十二枚半夏半升右六味以水七升煮取三升溫分三服
