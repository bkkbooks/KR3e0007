body:
  text: 瘡癰腸癰浸淫病脈證并治第十八論一首脈證三條方五首諸浮數脈應當發熱而反灑淅惡寒若有痛處當發其癰師曰諸雍腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腹內有癰膿薏苡附子敗醬散主之薏苡附子敗醬散方薏苡仁十分附子二分敗醬五分右三味杵為末取方寸匕以水二升煎減半頓服小便當下腸癰者小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之大黃牡丹湯方大黃四兩牡丹一乙兩桃仁五十箇瓜子半升芒消三合右五味以水六升煮取一升去滓內芒消再煎沸頓服之有膿當下如無膿當下血問曰寸口脈浮微而澀然當亡血若汗出設不汗者云何答曰若身有瘡被刀斧所傷亡血故也病金瘡王不留行散主之王不留行散方王不留行十分八月八日採蒴藋細葉十分七月七日採桑東南根白皮十分三月三日採甘草十八分川椒三分除日及閉口者汁黃芩二分乾薑二分芍藥二分厚朴二分右九味桑根皮以上三味燒灰存性勿令灰過各別杵篩合治之為散服方寸匕小瘡即粉之大瘡但服之産後亦可服如風寒桑東根勿取之前三物皆陰乾百日排膿散方枳實十六枚芍藥六分桔梗一分右三味杵為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服排膿湯方甘草二兩桔梗三兩生薑一兩大棗十枚右四味以水三升煮取一升溫服五合日再服浸淫瘡從口流向四肢者可治從四肢流來入口者不可治浸淫瘡黃連粉主之
