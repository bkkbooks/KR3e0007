body:
  text: 趺蹶手指臂腫轉筋陰狐疝蛔蟲病脈證治第十九論一首脈證一條方五首師曰病趺蹶其人但能前不能卻刺腨入二寸此太陽經傷也病人常以手指臂腫動此人身體瞤瞤者藜蘆甘草湯主之藜蘆甘草湯方轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白散主之雞屎白散方雞屎白右一味為散取方寸匕以水六合和溫服陰狐疝氣者偏有小大時時上下蜘蛛散主之蜘蛛散方蜘蛛十四枚熬焦桂枝半兩右二味為散取八分一匕飲和服日再服蜜丸亦可問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲蛔蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之甘草粉蜜湯方甘草二兩粉一兩重蜜四兩右三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升差即止蛔厥者當吐蛔令病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之鳥梅丸方烏梅三百箇細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩炮川椒四兩去汁桂枝六兩人參黃蘗各六兩右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如極子大先食飲服十丸三服稍加至二十丸禁生冷滑臭等食
