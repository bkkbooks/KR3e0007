body:
  text: 婦人妊娠病脈證并治第二十脈證三條方八首師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者卻一月加吐下者則絶之婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其癥不去故也當下其癥桂枝茯苓丸主之桂枝茯苓丸方桂枝茯苓牡丹去心桃仁去皮尖熬芍藥各等分右五味末之煉蜜和丸如兔屎大每日食前服一丸不知加至三丸婦人懷娠六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子藏開故也當以附子湯溫其藏師曰婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之芎歸膠艾湯方芎窮阿膠甘草各二兩艾葉當歸各三兩芍藥四兩乾地黃右七味以水五升清酒五升合煮取三升去滓內膠令消盡溫服一升日三服不差更作婦人懷娠腹中㽱痛當歸芍藥散主之當歸芍藥散方當歸三兩芍藥一斤茯苓四兩白朮四兩澤瀉半斤芎藭半斤右六味杵為散取方寸匕酒和日三服妊娠嘔吐不止乾薑人參半夏丸主之乾薑人參半夏丸方乾薑人參各一兩半夏二兩右三味末之以生薑汁糊為丸如梧子大飲服十丸日三服妊娠小便難飲食如故歸母苦參丸主之當歸貝母苦參丸方當歸貝母苦參各四兩右三味末之煉蜜丸如小豆大飲服三丸加至十丸妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之葵子茯苓散方葵子一斤茯苓三兩右二味杵為散飲服方寸匕日三服小便利則愈婦人妊娠宜常服當歸散主之當歸散方當歸黃芩芍藥芎藭各一兩白朮半斤右五味杵為散酒飲服方寸匕日再服妊娠常服即易産胎無苦疾産後百病悉主之妊娠養胎白朮散主之白朮散方白朮芎窮蜀椒三分汁牡蠣右四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之已後渴者大麥粥服之病雖愈服之勿置婦人傷胎懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈
