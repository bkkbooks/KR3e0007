body:
  text: 婦人産後病脈證治第二十一論一首脈證六條方七首問曰新産婦人有三病一者病痓二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痓亡血復汗寒多故令鬱冒亡津液胃燥故大便難産婦鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之産後腹中疼痛當歸生薑羊肉湯主之并治腹中寒疝虛勞不足當歸生薑羊肉湯方産後腹痛煩滿不得臥枳實芍藥散主之枳實芍藥散方枳實燒令黑勿太過芍藥等分右二味杵為散服方寸匕日三服並主癰膿以麥粥下之師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利下瘀血湯方大黃二兩桃仁二十枚蟅蟲二十枚熬去足右三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則讝語至夜即愈宜大承氣湯主之熱在裏結在膀胱也産後風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在耳可與陽旦湯産後中風發熱面正赤喘而頭痛竹葉湯主之竹葉湯方竹葉一杷葛根三兩防風一兩桔梗桂枝人參甘草各一兩附子一枚炮大棗十五枚生薑五兩右十味以水一斗煮取二升半分溫三服溫覆使汗出頸項強用大附子一枚破之如豆大前藥揚去沫嘔者加半夏半升洗婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之竹皮大丸方生竹茹二分石膏二分桂枝一分甘草七分白薇一分右五味末之棗肉為丸彈子大以飲服一丸日三夜二服有熱者倍白薇煩喘者加柏實一分産後下利虛極白頭翁加甘草阿膠湯主之白頭翁加甘草阿膠湯方白頭翁甘草阿膠各二兩秦皮黃連蘗皮各三兩右六味以水七升煮取二升半內膠令消盡分溫三服附方千金三物黃芩湯治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黃芩一兩苦參二兩乾地黃四兩右三味以水八升煮取二升溫服一升多吐下蟲千金內補當歸建中湯治婦人産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急摩痛引腰背不能食飲産後一月日得服四五劑為善令人強壯宜當歸四兩桂枝三兩芍藥六兩生薑三兩甘草二兩大棗十二枚右六味以水一斗煮取三升分溫三服一日令盡若大虛加飴糖六兩湯成內之於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成內阿膠若無當歸以芎藭代之若無生薑以乾薑代之
