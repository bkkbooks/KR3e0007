body:
  text: 雜療方第二十三論一首證一條方二十二首退五藏虛熱四時加減柴胡飲子方冬三月加柴胡八分白朮八分大腹檳榔四枚并皮子用陳皮五分生薑五分桔梗七分春三月加枳實減白朮共六味夏三月加生薑三分枳實五分甘草三分共八味秋三月加陳皮三分共六味右各㕮咀分為三帖一貼以水三升煮取二升分溫三服如人行四五里進一服如四體壅添甘草少許每貼分作三小帖每小帖以水一升煮取七合溫服再合滓為一服重煮都成四服長服訶梨勒丸方訶梨勒燥陳皮厚朴各三兩右三味末之煉蜜丸如梧子大酒飲服二十丸加至三十丸三物備急丸方大黃一兩乾薑一兩巴豆一兩去皮心熬外研如脂右藥各須精新先搗大黃乾薑為末研巴豆內中合治一千杵用為散蜜和丸亦佳密器中貯之莫令歇主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口禁停尸卒死者以暖水若酒服大豆許三四丸或不下捧頭起灌令下咽須臾當差如未差更與三丸當腹中鳴即吐下便差若口禁亦須折齒灌之治傷寒令愈不復紫石寒食散方紫石英白石英赤石脂鍾乳碓鍊括蔞根防風桔梗文蛤鬼臼各十分太一餘糧十分燒乾薑附子炮去皮桂枝去皮各四分右十三味杵為散酒服方寸匕救卒死方薤搗汁灌鼻中又方雄雞冠割取血管吹內鼻中豬脂如雞子大苦酒一升煮沸灌喉中雞肝及血塗面上以灰圍四旁立起大豆二七粒以雞子白并酒和盡以吞之救卒死而壯熱者方礬石半斤以水一斗半煮消以漬腳令沒踝救卒死而目閉者方騎牛臨面搗薤汁灌耳中吹皂莢末鼻中立效救卒死而張口反折者方灸手足兩爪後十四壯了飲以五毒諸膏散救卒死而四肢不收失便者方馬屎一升水三斗煮取二斗以洗之又取牛洞一升溫酒灌口中灸心下一寸臍上三寸臍下四寸各一百壯差救小兒卒死而吐利不知是何病方狗屎一丸絞取汁以灌之無濕者水煮乾者取汁尸蹶脈動而無氣氣閉不通故靜而死也治方菖蒲屑內鼻兩孔中吹之令人以桂屑著舌下又方剔取左角髮方寸燒末酒和灌令入喉立起救卒死客忤死還魂湯主之方麻黃三兩去節一方四兩杏仁去皮尖七十箇甘草一兩炙千金用桂心二兩右三味以水八升煮取三升去滓分令咽之通治諸感忤又方韭根一把烏梅二七箇吳茱萸半升炒右三味以水一斗煮之以病人櫛內中三沸櫛浮者生沉者死煮取三升去滓分飲之救自縊死旦至暮雖已冷必可治暮至旦少難也恐此當言忿氣盛故也然夏時夜短於晝又熱猶應可治又云心下若微溫者一日以上猶可治之方徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手少挽其髮常弦弦勿縱之一人以手按據胸上數動之一人摩拌臂脛屈伸之若已殭但漸漸強屈之并按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須臾可少桂湯及粥清含與之令濡喉漸漸能咽及稍止若向令兩人以管吹其兩耳罙好此法最善無不活者凡中暍死不可使得冷得冷便死療之方屈草帶繞暍人臍使三兩人溺其中令溫亦可用熱泥和屈草亦可扣瓦碗底按及車缸以著暍人取令溺須得流去此謂道路窮卒無湯當令溺其中欲使多人溺取令溫若湯使可與之不可泥及車缸恐此物冷既在夏月得熱泥土暖車缸亦可用也救溺死方取竈中灰兩石餘以埋人從頭至足水出七孔即活右療自縊溺暍之法並出自張仲景為之其意殊絶殆非常情所及本草所能關實救人之大術矣傷寒家數有暍病非此遇熱之暍治馬墜及一切筋骨損方大黃一兩切浸湯成下緋帛如手大燒灰亂髮如雞子大燒灰用久用炊單布一尺燒灰敗蒲一握三寸桃仁四十九箇去皮尖熬甘草如中指節炙銼右七味以童子小便量多少煎湯成內酒一大盞次下大黃去滓分溫三服先銼敗蒲席半領煎湯浴衣被蓋覆斯須通利數行痛楚立差利及浴水赤勿怪即瘀血也
