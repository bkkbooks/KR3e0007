body:
  text: 禽獸魚蟲禁忌并治第二十四論辨二首合九十法方二十一首凡飲食滋味以養於生食之有妨反能為害自非服藥煉液焉能不飲食乎切見時人不間調攝疾疢競起若不因食而生苟全其生須知切忌者矣所食之味有與病相宜有與身為害若得宜則益體害則成疾以此致危例皆難療凡煮藥飲汁以解毒者雖云救急不可熱飲諸毒病得熱更甚宜冷飲之肝病禁辛心病禁鹹脾病禁酸肺病禁苦腎病禁甘春不食肝夏不食心秋不食肺冬不食腎四季不食脾辨曰春不食肝者為肝氣王脾氣敗若食肝則又補肝脾氣敗尤甚不可救又肝王之時不可以死氣入肝恐傷魂也若非王時即虛以肝補之佳余藏準此凡肝藏自不可輕噉自死者彌甚凡心皆為神識所舍切食之使人來生復其報對矣凡肉及肝落地不著塵土者不可食之豬肉落水浮者不可食諸肉及魚若狗不食鳥不啄者不可食諸肉不乾火炙不動見水自動者不可食之肉中有如朱點者不可食之六畜肉熱血不斷者不可食之父母及身本命肉食之令人神魂不安食肥肉及熱羹不得飲冷水諸五藏及魚投地塵上不污者不可食之穢飯餒肉臭魚食之皆傷人自死肉口閉者不可食之六畜自死皆疫死則有毒不可食之獸自死北首及伏地者食之殺人食生肉飽飲乳變成白蟲疫死牛肉食之令病洞下亦致堅積宜利藥下之脯臟米甕中有毒及經夏食之發腎病治自死六畜肉中毒方黃蘗屑搗服方寸匕治食鬱肉漏脯中毒方燒犬屎酒服方寸匕每服人乳汁亦良飲生韭汁三升亦得治黍米中藏乾脯食之中毒方大豆濃煮汁飲數升即解亦治狸肉漏脯等毒治食生肉中毒方掘地深三尺取其下土三升以水五升煮數沸澄清汁飲一升即愈治六畜鳥獸肝中毒方水浸豆豉絞取汁服數升愈馬腳無夜眼者不可食之食酸馬肉不飲酒則殺人馬肉不可熱食傷人心馬鞍下肉食之殺人白馬黑頭者不可食之白馬青蹄者不可食之馬肉豚肉共食飽醉臥大忌驢馬肉合豬肉食之成霍亂馬肝及尾不可妄食中毒害人治馬肝毒中人未死方雄鼠屎二七粒末之水和服日再服又方人垢取方寸匕服之佳治食馬肉中毒欲死方香豉二兩杏仁三兩右二味蒸一食頃熟杵之服日再服又方煮蘆根汁飲之良疫死牛或目赤或黃食之大忌牛肉共豬肉食之必作寸白蟲青牛腸不可合犬肉食之牛肺從三月至五月其中有蟲如馬尾割去勿食食則損人牛羊豬肉皆不得以楮木桑木蒸炙食之令人腹內生蟲噉蛇牛肉殺人何以知之噉蛇者毛髮向後順者是也治噉蛇牛肉食之欲死方飲人乳汁一升立愈又方以泔洗頭飲一升愈牛肚細切以水一斗煮取一升暖飲之大汗出者愈治食牛肉中毒方甘草煮汁飲之即解羊肉其有宿熱者不可食之羊肉不可共生魚酪食之害人羊蹄甲中有珠子白者名羊懸筋食之令人癲白羊黑頭食其腦作腸癰羊肝共生椒食之破人五藏豬肉共羊肝和食之令人心悶豬肉以生胡荽同食爛人臍豬脂不可合梅子食之豬肉和葵食之少氣鹿肉不可和蒲白作羹食之發惡瘡麋脂及梅李子若妊婦食之令子青盲男子傷精麞肉不可合蝦及生菜梅李果食之皆病人痼疾人不可食熊肉令終身不愈白犬自死不出舌者食之害人食狗鼠餘令人發瘻瘡治食犬肉不消心下堅或腹脹口乾大渴心急發熱妄語如狂或洞下方杏仁一升合皮熟研用右以沸湯三升和取汁分三服利下肉片大驗婦人妊娠不可食兔肉山羊肉及鱉雞鴨令子無聲音兔肉不可合白雞肉食之令人面發黃兔肉著乾薑食之成霍亂凡鳥自死口不閉翅不合者不可食之諸禽肉肝青者食之殺人雞有六翮四距者不可食之烏雞白首者不可食之雞不可共葫蒜食之滯氣山雞不可合鳥獸肉食之雉肉久食之令人瘦鴨卵不可合鱉肉食之婦人妊娠食雀肉令子淫亂無恥雀肉不可合李子食之燕肉勿食入水為蛟龍所噉鳥獸有中毒箭死者其肉有毒解之方大豆煮汁及鹽汁服之解魚頭正白如連珠至脊上食之殺人魚頭中無腮者不可食食之殺人魚無腸膽者不可食食之三年陰不起女子絶生魚頭似有角者不可食之魚目合者不可食之六甲日勿食鱗甲之物魚不可合雞肉食之魚不得合鸕鷀肉食之鯉魚鮓不可合小豆藿食之其子不可合豬肝食之害人鯉魚不可合犬肉食之鯽魚不可合猴雉肉食之一云不可合豬肝食鯷魚合鹿肉生食令人筋甲縮青魚鮓不可合生葫荽及生葵并麥中食之鰌鱔不可合白犬血食之龜肉不可合酒果子食之鱉目凹陷者及厭下有王字形者不可食之其肉不得合雞鴨子食之龜鱉肉不可合莧菜食之蝦無鬚及腹下通黑煮之反白者不可食之食膾飲乳酪令人腹中生蟲為瘕鱠食之在心胸間不化吐復不出速下除之久成癥病治之方橘皮一兩大黃二兩朴消二兩右三味以水一大升煮至小升頓服即消食鱠多不消結為癥病治之方馬鞭草右一味搗汁飲之或以薑葉汁飲之一升亦消又可服吐藥吐之食魚後食毒兩種煩亂治之方橘皮右濃煎汁服之即解食鯸鮧魚中毒方蘆根右煮汁服之即解蟹目相向足班目赤者不可食之食蟹中毒治之方紫蘇右煮汁飲之三升紫蘇子搗汁飲之亦良又方冬瓜汁飲二升食冬瓜亦可凡蟹未遇霜多毒其熟者乃可食之蜘蛛落食中有毒勿食之凡蜂蠅蟲蟻等多集食上食之致瘻
