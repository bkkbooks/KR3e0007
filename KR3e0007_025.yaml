body:
  text: 果實菜穀禁忌并治第二十五果子生食生瘡果子落地經宿蟲蟻食之者人大忌食之生米停留多日有損處食之傷人桃子多食令人熱仍不得入水浴令人病淋瀝寒熱病杏酪不熟傷人梅多食壞人齒李不可多食令人臚脹林檎不可多食令人百脈弱橘柚多食令人口爽不知五味梨不可多食令人寒中金瘡産婦亦不宜食之櫻桃杏多食傷筋骨安石榴不可多食損人肺胡桃不可多食令人動痰飲生棗多食令人熱渴氣脹寒熱羸瘦者彌不可食傷人食諸果中毒治之方豬骨燒過右一味末之水服方寸匕亦治馬肝漏脯等毒木耳赤色及仰生者勿食菌仰卷及赤色者不可食食諸菌中毒悶亂欲死治之方人糞汁飲一升土漿飲一二升大豆濃煮汁飲之服諸吐利藥並解食楓柱菌而哭不止治之以前方誤食野芋煩毒欲死治之方蜀椒閉口者有毒誤食之戟人咽喉氣病欲絶或吐下白沫身體痺冷急治之方肉桂煎汁飲之多飲冷水一二升或食蒜或飲地漿或濃煮豉汁飲之並解正月勿食生蔥令人面生遊風二月勿食蓼傷人腎三月勿食小蒜傷人志性四月八月勿食胡荽傷人神五月勿食韭令人乏氣力五月五日勿食一切生菜發百病六月七月勿食茱萸傷神氣八月九月勿食薑傷人神十月勿食椒損人心傷心脈十一月十二月勿食薤令人多涕唾四季勿食生葵令人飲食不化發百病非但食中藥中皆不可用深宜慎之時病差未健食生菜手足必腫夜食生菜不利人十月勿食被霜生菜令人面無光目澀心痛腰疼或發心瘧瘧發時手足十指爪皆青困委蔥韭初生芽者食之傷人心氣飲白酒食生韭令人病增生蔥不可共蜜食之殺人獨顆蒜彌忌棗合生蔥食之令人病生蔥和雄雞雉白犬肉食之令人七竅經年流血食糖蜜後四日內食生蔥蒜令人心痛夜食諸薑蒜蔥等傷人心蕪菁根多食令人氣脹薤不可共牛肉作羹食之成瘕病韭亦然蓴多食動痔疾野苣不可同蜜食之作內痔白苣不可共酪同食作𧈟蟲黃瓜食之發熱病葵心不可食傷人葉尤冷黃背赤莖者勿食之胡荽久食之令人多忘病人不可食胡荽及黃花菜芋不可多食動病妊婦食薑令子餘指蓼多食發心痛蓼和生魚食之令人奪氣陰咳疼痛芥菜不可共兔肉食之成惡邪病小蒜多食傷人心力食躁或躁方豉右濃煮汁飲之鉤吻與芹菜相似誤食之殺人解之方薺苨八兩右一味水六升煮取二升分溫二服菜中有水莨菪葉圓而光有毒誤食之令人狂亂狀如中風或吐血治之方甘草右煮三十服之即解春秋二時龍帶精入芹菜中人偶食之為病發時手背腹滿痛不可忍名蛟龍病治之方硬糖二三升右一味日兩度服之吐出如蜥蜴三五枚差食苦瓜中毒治之方黎穰右煮汁數服之解扁豆寒熱者不可食之久食小豆令人枯燥食大豆等忌噉豬肉大麥久食令人作癬白黍米不可同飴蜜食亦不可合葵食之荍麥麵多食之令人髮落鹽多食傷人肺食冷物冰人齒食熱物勿飲冷水飲酒食生蒼耳令人心痛夏月大醉汗流不得冷水洗著身及使扇即成病飲酒大忌灸腹背令人腸結醉後勿飽食發寒熱飲酒食豬肉臥禾稻穰中則發黃食飴多飲酒大忌凡水及酒照見人影動者不可飲之醋合酪食之令人血瘕食白米粥勿食生蒼耳成走疰食甜粥已食鹽即吐犀角筋攪飲食沫出及澆地墳起者食之殺人飲食中毒煩滿治之方苦參三兩苦酒一升半右二味煮三沸三上三下服之吐食出即差或以水煮亦得又方犀角湯亦佳貪食食多不消心腹堅滿痛治之方鹽一升水三升右二味煮令鹽消分三服當吐出食便差礬石生入腹破人心肝亦禁水商陸以水服殺人葶藶子傅頭瘡藥成入腦殺人水銀入人耳及六畜等皆死以金銀著耳邊水銀則吐苦練無子者殺人凡諸毒多是假毒以投元知時宜煮甘草薺苨汁飲之通除諸毒藥
