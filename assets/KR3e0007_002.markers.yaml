  - {type: variant, offset: 330, length: 1, content: 兩, krp: 味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之脉浮而細滑傷飲脉弦數有寒飲冬夏難治脉沉而弦者懸飲内痛病懸飲者十棗湯主之十棗湯方芫花熬甘遂大㦸各等分右三味搗篩以水一升五合先煮肥大棗十枚取九合去滓内藥末强人服一錢匕羸人服半錢平旦服不下者明日更加半錢得快下後糜粥自養病溢飲者當發其汗大青龍湯主之小青龍湯亦主之大青龍湯方}
