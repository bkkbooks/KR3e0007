  - {type: variant, offset: 270, length: 0, content: '', SBCK: 末之煉􅁡和丸梧子大飲服十丸日三以知爲度腎着之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病属下焦身劳汗出衣一作表裏冷濕乆乆得之腰以下冷痛腹重如帶五千錢乾姜苓术湯主之甘草乾姜茯苓白术湯方甘草白术各二两乾姜茯苓各四两右四味}
