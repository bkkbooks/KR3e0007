  - {type: variant, offset: 1243, length: 0, content: '', krp: 升取馬通汁一升合煮取一升分温再服下血先便後血此遠血也黃土湯主之黄土湯方亦主吐血衂血甘草乾地黄白术附子炮阿膠黄苓各三两竈中黄土半斤右七味以水八升煮取三升分温二服下血先血後便此近血也赤小豆當歸散主之方見孤惑中心氣不足吐血衂血用後方瀉心湯亦治霍亂大黄二两黄連黄芩各一两右三}
