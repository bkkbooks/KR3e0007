  - {type: variant, offset: 241, length: 3, content: 括蔞根, SBCK: 皆同心中風者翕翕發􅀬不能起心中饑食即嘔􅄍心中寒者其人苦病心如噉蒜狀劇者心痛徹背背痛徹心譬如蠱注其脉浮者自􅄍乃愈心傷者其人劳倦即頭面赤而下重心中痛而自煩發􅀬當臍跳其脉弦此爲心臟傷所致也心死臟浮之實如麻豆按之益躁疾者死邪哭使魂魄不安者血氣少也血氣少者属於心心氣虚者其人則畏合目􅁒眠夣逺行而精神離散魂魄妄行隂氣衰者爲癲陽氣衰者爲狂脾中風者翕翕發􅀬形如醉人腹中煩重皮目瞤瞤而短氣脾死臟浮之大堅按之如覆盃㓗㓗狀如揺者死臣億等計五藏各有中風中寒今脾只載中風腎中風中寒俱不載者以古文簡亂極多去右旣遠無文可以􅀘綴也趺陽脉浮而濇浮則􅅐氣强濇則小便數浮濇相摶大便則堅其脾爲約麻子仁丸主之麻子仁丸方麻子仁}
