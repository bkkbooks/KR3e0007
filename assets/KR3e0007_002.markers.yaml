  - {type: variant, offset: 1388, length: 1, content: 初, SBCK: 夫六府氣絶於外者手足寒上氣脚縮五臟氣絶於内者利不禁下甚者手足不仁下利脉沉弦者下重脉大者爲未止脉㣲弱數者爲􅁒自止雖發􅀬不死下利手足厥冷無脉者炙之不濕􅀂脉不還反㣲喘者死少隂􅀒趺陽者爲順也下利有㣲􅀬而渴脉弱者今自愈下利脉數有㣲􅀬汗出今自愈設脉􅂃爲未解下利脉數而渴者今自愈設不差必清膿血以有􅀬故也下利脉反弦發􅀬身汗者自愈下利氣者當利其小便下利寸脉反浮數尺中自濇者必清膿血下利清榖不可攻其表汗出必脹滿下利脉沉而遲其人面少赤身有㣲執下利清榖者必欝胃汗岀而解病人必㣲􅀬所以然者其面戴陽下虚故也下利後脉絶手足厥冷晬時脉還手足温者生脉不還者死下利腹脹滿身體疼痛者先温其裏乃攻其表温裏冝四逆湯攻表冝桂枝湯四逆湯方見上桂枝湯桂枝三两去皮芍藥三两甘草三两炙生姜三两大􅀥十二枚右五味㕮咀以水七升㣲火煮取三升去滓適寒温服一升服已湏􅁷啜稀粥一升巳助藥力温覆令一時許遍身􅀬􅀬㣲似有汗者益佳不可令如水淋漓􅀂一服汗岀病差停後服下利三部脉皆平按之心下堅者急下之冝大承湯下利脉遲而滑者實也利未􅁒止急下之冝大承氣湯下利脉反滑者當有所去下乃愈冝大承氣湯下利巳差至其年月日時復發者以病不盡故也當下之冝大承氣湯大承氣湯見痓病中下利譫語者有燥屎也小承氣湯主之小承氣湯大黃四两厚朴二两炙枳實大者三枚炙右三味以水四升煮取一升二合去滓分温二}
