  - {type: variant, offset: 282, length: 0, content: '', SBCK: 腰中即温腎死臟浮之堅按之亂如轉丸益下入尺中者死問曰三噍竭部上噍竭善噫何謂也師曰上焦受中焦氣未和不能消榖故能噫耳下焦竭即遺溺失便其氣不和不能自禁制不湏治久則愈師曰􅀬在上焦者因欬為肺痿􅀬在中焦者則爲堅􅀬在下焦者則尿血亦令淋秘不通大腸有寒者多鶩溏有􅀬者便腸垢小腸有寒者其人下重便血有􅀬者必痔問曰病者積有聚有㯏氣何謂也師曰積者藏病也終不移聚者府病也發作有時展轉痛移為可治㯏氣者脇下痛按之則愈復發為㯏氣諸積大法脉来細而附骨者乃積也寸口積在胸中㣲出寸口積在喉中関上積在臍傍上関上積在心下㣲下関積在小腹尺中積在氣衝脉出左積在左脉出右積在右脉两岀積在中央各以其部處之痰飲欬嗽病脉證幷治第十二論一首脉證二十一條方十九首問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以爲異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飮飲後水流在脇下欬唾引痛謂之懸飲飲水流行歸於四肢當汗岀而不汗出身體疼重謂之溢飲欬逆􅀝息短氣不得卧其形如腫謂之支飲水在心心下堅築短氣惡水不􅁒飲水在肺􅄍涎沫􅁒飲水水在脾少氣身重水在肝脇下支滿嚏而痛水在腎心下悸夫心下有留飲其人背寒冷如水大留飲者脇下痛引缺盃欬嗽則輒已一作轉甚胸中有留飲其人短氣而渴四肢歷節痛脉沉者有留飲膈上病痰滿喘欬􅄍發則寒􅀬背痛腰疼目泣自出其人振振身瞤劇必有伏飲夫病人飲水多必􅁀喘滿凡食少飲多水停心下甚者則悸㣲者短氣脉䨇弦者寒也皆大下後虚脉偏弦者飮也肺飲不弦但苦喘短氣支飲亦喘而不能卧加短氣其脉平也病痰飲者當以温藥和之心下有痰飲胸脇支滿目眩用後方茯桂甘白湯方茯苓四两桂枝白术各三两甘草二两右四味以水六升煮}
