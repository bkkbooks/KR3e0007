  - {type: variant, offset: 1224, length: 0, content: '', SBCK: 右七味以水七升煮麻黃去上沬内諸藥煮取二升分温三服當汗出如䖝行皮中即愈心下堅大如盤邉如旋盤水飲所作枳术湯主之枳术湯方枳實七枚白术二两右二味以水五升煮取三升分温三服腹中耎即當附方外䑓防巳黃耆湯治風水脉浮為在表其人或頭汗岀表無他病病者但下重從腰以上為和腰以下當腫及隂難以屈伸方見氣濕中黃疸病脉證幷治第十五論二首脉證十四條方七首寸口脉浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀􅀬以行趺陽脉堅而數數則為􅀬􅀬則消榖􅂃則為寒食即為滿尺脉浮爲傷腎趺陽脉􅂃為傷脾風寒相摶食榖即昡榖氣不消胃中苦渴渴氣下流不便不通隂􅀍其寒􅀬流膀胱身體盡黄名曰􅂖疸額上黒㣲汗岀手足中􅀬薄暮即發膀胱急小便自利名曰女劳疸腹如水状不治心中懊憹而􅀬不能食時􅁒􅄍名曰酒疸陽明病脉遲者食難用炮炮則發煩頭痃小便必難此􅁒作榖疸雖下之腹滿如故所以然者脉遲故也夫病酒黃疸必小便不利其候心中􅀬足下􅀬是其證也酒黄疸者或無􅀬請言了腹滿􅁒􅄍鼻燥其脉浮者先􅄍之沉弦者先下之酒疸心中􅀬􅁒嘔者􅄍之愈酒疸下之乆乆爲黒疸目青面黒心中如噉蒜韲状大便正黒皮膚􅀲之不仁其脉浮弱雖黒㣲黄故知之師曰病黄疸發􅀬煩喘胸滿口燥有以病發時火劫其汗两􅀬所得然黄家所得從濕得之一身盡發􅀬面黄肚􅀬􅀬在裏當下之脙沉渴􅁒飲水小便不利者皆發黃腹滿舌痿黄燥不得睡属黄家右痿疑作心痿黃疸之病當以十八日為期治之十日以上瘥反極為難治疸而渴者其疸難治疸而不渴者其疸可治發於隂部其人必嘔陽部其人振寒而發􅀬也榖疸之為病寒􅀬不食食即頭眩心胸不安攵久發黃為榖疸􅌲陳湯主之􅌲陳湯方􅌲陳蒿六两梔子十四枚大黃二两右三味以水一斗先煮茵陳減六升内三味煮取三升去滓分温三服小便當利尿如皂角汁状色正赤一􅀫腹減黃從小便去也黃家日晡時發􅀬面反惡寒此為女劳得之腣胱急少腹滿身盡黄額上黒足下􅀬因作黒疸其腹脹如水状大便必黒時溏此女劳之病非水也腹滿者難治用後方消礬散方消石礬石燒等分右二味為末以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黒是􅀱也酒黄疸心中懊憹或􅀬痛梔子大黃湯主之梔子大黃湯方梔子十四枚大黃二两枳實五枚豉一升右四味以水六升煮取二升分温三服諸病黄家但利其小便假令脉浮當以汗解之冝桂枝加黃􅂄湯主之方見水病中諸黄用後方猪膏髪煎猪膏半斤亂髪如鷄子大三枚右二味和膏中煎之髪消藥成分􅂯服病從小便出黄疸病茵陳五苓散主之一本云茵陳湯及五苓散並主之茵陳五苓散茵陳稿末十分五苓散五分方見痰飲中右二物和先食飲方寸匕日三服黃疸腹滿小便不利而赤自汗出此爲表和裏實當下之冝大黄滑石湯大黄滑石湯大黄黃檗滑石各四两梔子十五枚右四味以水六升煑取二升去滓内滑石更煮取一升頓服黄疸病小便色不變􅁒自利腹滿而喘不可除􅀬􅀬除必噦噦者小半夏湯主之方見消􅠽中諸劳腹痛而嘔者冝柴胡湯必小柴胡湯方見嘔􅄍中男子黄小便自利當與虚劳小建中湯方見虚劳中附方􅋎蒂湯治諸黃方見暍病中千金麻黃醇酒湯治黄疸麻黃三两右一味以羙清酒五升煮取二升半頓服盡冬月用酒春月用水煮之驚悸􅄍衂下血胸滿瘀血病脉證治第十六脉證十二條方五首寸口脉動而弱動即為驚弱則為悸師曰夫脉浮目睛暈黃衂未止暈黃去目睛急了知衂今止又曰從春至夏衂者太陽從秋至冬衂者陽明衂家不可汗汗岀必額上䧟脉緊急直視不能眴不得眠病人面無色無寒􅀬脉沉弦者衂浮弱手按之絶者下血煩欬者必􅄍血夫􅄍血欬逆上氣其脉數而有􅀬不得卧者死夫酒客欬者必致􅄍血此因極飲過度所致也寸口脉弦而大弦則為减大則為芤减則為寒芤則為虚寒虚相擊此名曰革婦人則半産漏下男子則亡血亡血不可發其表汗出則寒慄而振病人胸滿唇痿舌青口燥但􅁒嗽水不􅁒嚥無寒􅀬脉㣲大来遲腹不滿其人言我滿為有瘀血病者如􅀬状煩滿口乾燥而渴其脉反無􅀬此為隂状是瘀血也當下之火邪者桂枝去芍藥加蜀􅃮牡蠣龍骨捄逆湯主之桂枝捄逆湯方桂枝二两}
