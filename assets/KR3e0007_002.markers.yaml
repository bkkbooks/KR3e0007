  - {type: variant, offset: 1242, length: 0, content: '', krp: 為末以水一斗二升先煮蜀􅃮減二升内諸藥後取三升去滓温服一升心下悸者半夏麻黄丸主之半夏麻黄丸方半夏麻黄等分右二味末之煉蜜和丸小豆大飲服三丸日三吐血不止者後湯主之栢葉湯栢葉乾姜各三两艾三把右三味以水}
  - {type: variant, offset: 1243, length: 0, content: '', SBCK: 升取馬通汁一升合煮取一升分温􅂯服下血先便後血此遠血也黃􅁟湯主之黄􅁟湯方亦主􅄍血衂血甘草乾地黄白术附子炮阿膠黄苓各三两竈中黄􅁟半斤右七味以水八升煮取三升分温二服下血先血後便此近血也赤小豆當歸散主之方見孤惑中心氣不足􅄍血衂血用後方瀉心湯亦治霍亂大黄二两黄連黄芩各一两右三}
