  - {type: variant, offset: 1223, length: 0, content: '', SBCK: 温服八分日三服杏子湯未見恐是麻黄杏仁甘草石膏湯厥而皮水者蒲􅁅散主之方見上問曰黃汗之為病身體腫一作重發􅀬汗出而渇状如風水汗沾衣色正黃如藥汁脉自沉何從得之師曰以汗出入水中浴水從汗孔入得之冝􅂄芍桂酒湯主之黄􅂄桂苦酒湯黄耆五两芍藥三两桂枝三两右三味以苦酒一升水七升相和煮取三升温服一升當心煩服至六七日乃解􅀂心煩不止者以苦酒阻故也一方用羙酒醃代苦酒黄汗之病两脛自冷假令發􅀬此属歷節食已汗出又身常暮盗汗出者此劳氣也􅀂汗出巳反發􅀬者久久其身必甲錯發􅀬不止者必生惡瘡􅀂身重汗出巳輙輕者久乆必身瞤即胸中痛又從腰以上必汗出不無汗腰髖弛痛如有物在皮中状劇者不能食身疼重煩燥小便不利為黃汗桂枝加黄􅂄湯主之桂枝加黄􅂄湯方桂枝芍藥各三两甘草二两生姜三两大􅀥十二枚黄􅂄二两右六味以水八升煑取三升温服一升湏􅁷飲􅀬稀粥一升餘以􅂇藥力温服取㣲汗􅀂不汗更服師曰寸口脉遲而濇遲則爲寒濇爲血不足趺陽脉㣲而遲㣲則爲氣遲則爲寒寒氣不足則手足逆冷手足逆冷則荣衞不利荣衞不利則腹滿脇鳴相逐氣轉膀胱荣衞俱劳陽不通即身冷氣不通即骨痛陽前通則惡寒隂前通則痺不仁隂陽相得其氣乃行大氣一轉其氣乃散實則失氣虚則遺尿名曰氣分氣分心下堅大如盤邉如旋杯水飲用後方主之桂姜草􅀥黃辛附湯方桂枝生姜三两甘草二两大􅀥十二枚麻黄細辛各二两附子一枚}
