  - {type: variant, offset: 472, length: 293, content: 二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一二沸分溫再服得下止服太陽病關節疼痛而煩脈沉而細者此名濕痹濕痺之候小便不利大便反快但當利其小便濕家之為病一身盡疼發熱身色如熏黃也濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利舌上如胎者以丹田有熱胸上有寒渴欲得飲而不能飲則口燥煩也濕家下之額上汗出微喘小便利者死若下利不止者亦死風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲出汗者風濕俱去也濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈濕家身煩疼可與, SBCK: ''}
