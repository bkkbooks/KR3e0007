  - {type: variant, offset: 1531, length: 1, content: 兩, krp: 两桂枝一两大棗十二枚半夏半升右六味以水七升煮取三升温分三服瘡癰腸癰浸淫病脉證幷治第十八論一首脉證三條方五首諸浮數脉應當發熱而反洒淅惡寒若有痛處當發其癰師曰諸癰腫𣣔知有膿無膿以手掩腫上熱者為有膿不熱者為無膿腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積飛身而熱脉數此為膿内有癰膿薏苡附子敗醤散主之薏苡附子敗醬散方薏苡仁十分附子二分敗醤五分右三味杵為末取方寸匕以水二升煎减半頓服小便當下腸癰者小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脉遲緊者膿未成可下之當有血脉洪數者膿巳成不可下也大黃牡丹湯主之大黄牡丹湯方大黃四两牡丹一两桃仁五十箇瓜子半升芒消三合}
