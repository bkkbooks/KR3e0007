  - {type: variant, offset: 1252, length: 0, content: '', SBCK: 頓服之嘔􅄍噦下利病脉證治第十七論一首脉證二十七條方二十三首夫嘔家有癰膿不可治嘔膿盡自愈先嘔􅁍渴者此為􅁒解先渴􅁍嘔者為水停心下此属飲家嘔家本渴今反不渴者以心下有支飲故也此属支飲問曰病人脉數數為􅀬當消數引食而反􅄍者何也師曰以發其汗令陽㣲膈氣虚脉乃數數為客􅀬不能消榖胃中虚冷故也脉弦者虚也胃氣無餘朝食暮􅄍變為胃反寒在於上醫反下之令脉反弦故名曰虚寸口脉㣲而數㣲則無氣無氣則荣虚荣虚則血不足血不足則胸中冷趺陽脉浮而濇浮則為虚虚則傷脾脾傷則不磨朝食暮􅄍暮食朝􅄍􅀫榖不化名曰胃反脉緊而濇其病難治病人􅁒􅄍者不可下之噦而腹滿視其前後知何部不利利之即愈嘔而胸滿者用後方茱茰湯吳茱茰一升人參三两生姜六两大􅀥十二枚右四味以水五升煮取三升温服七合日三服乾嘔􅄍涎沬頭痛者茱茰湯主之方見上嘔而腸鳴心下痞者用後方半夏瀉心湯半夏半升洗黃芩乾姜人參各三两黄連一两大􅀥十二枚甘草三两炙右七味以水一斗煮取六升去滓􅂯煮取三升温服一升日三乾嘔而利者用後方黄芩加半夏生姜湯方黃芩三两甘草二两炙芍藥三两半夏半斤生姜四两大􅀥二十枚右六味以水一斗煮取三升去滓温服一升日􅂯夜一服諸嘔􅄍􅂖不得下者小半夏湯主之方見痰飲中嘔􅄍而病在膈上後思水者解急與之思水者用後方猪苓散猪苓茯苓白术各等分右三味杵為散飲服方寸匕日三嘔而脉弱小便復利身有㣲􅀬見厥者難治用後方四逆湯附子七箇生用乾姜一两半甘草二两炙右三味以水三升煮取一升二合}
