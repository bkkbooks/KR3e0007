  - {type: variant, offset: 1209, length: 1, content: 朮, krp: 术三分桂二分去皮右五味爲末白飲服方寸匕日三服多飲暖水汗出愈附方外䑓茯苓飮治心胸中有停痰宿水自吐出水後心胸間虚氣滿不能食消痰氣令能食茯苓人參白术各三两枳實二两橘皮二两半生姜四两右六味水六升煮取一升八合分温三服如人行八九里進之欬家其脉弦爲有水十棗湯主之方見上夫有支飲家欬煩胸中痛者不卒死至一百日一歳冝十棗湯方見上人欬數歳其脉弱者可治實大數者死其脉虚者必若冐其人本有支飲在胸中故也治屬飲家欬逆倚息不得卧小青龍湯主之方見上文肺癰中青龍湯下巳多唾口燥寸脉沉尺脉㣲手足厥逆氣從小腹上衝胸咽手足痺其面翕然熱如醉狀因復下流隂股小便難時復冐者與茯苓桂枝五味甘草湯治其氣衝桂苓五味甘草湯方茯苓四两桂枝四两去皮甘草炙三两五味子半升右四味以水八升煮取三升去滓分三温服衝氣即低而反更欬胸滿者用桂苓五味甘草湯去桂加生姜細辛以治其欬滿苓甘五味姜辛湯方茯苓四两甘草乾姜細辛各三两五味半升右五味以水八升煮取三升去滓温服半升日三服欬滿即止而更復渴衝氣復發者以細辛乾姜爲熱藥也服之當遂滿而渴反止者為支飲也支飲者法當冐冐者必嘔嘔者復内半夏以去其水桂苓味甘去桂四姜辛夏湯方茯苓四两甘草細辛乾姜各二两五味半夏各半升右六味以水八升煮取三升去滓温服半升日三服水去嘔止其人形腫者加杏仁主之其證應内麻黄以其人遂痺故不内之若逆而内之者必厥所以然者以其人血虚麻黃發其陽故也苓芍姜味辛夏仁湯茯苓四两甘草三两五味半升乾姜三两細辛三两半夏半升杏仁半升去皮尖右七味以水一斗煮取三升去滓温服半升日三服若面熱如醉此爲冐熱上衝熏其面加大黄以利之茯甘姜味辛夏仁黄湯茯苓四两甘草三两五味半升乾姜三两細辛三两半夏半升杏仁半升大黃三两右八味以水一斗煮取三升去滓温服半升日三服先渴後嘔爲水停心下此属飲家小半夏茯苓湯主之方見上消渴小便利淋病脉證并治第十三脉證九條方六首厥隂之爲病消渴氣上衝心心中疼熱熱而不欲食食即吐下之不肯止寸口脉浮而運浮即爲虚運即爲勞虚則衞氣不足勞則榮氣竭跌陽脉浮而數浮即爲氣數即消榖而大堅乙作緊氣盛則溲數數數即堅堅數相摶即為消渇男子消渇小便反多以飲一斗小便一斗腎氣丸主之方見脚氣中脉浮小便不利㣲熱消渇者宜利小便發汗五苓散主之渴𣣔飲水水入則吐者名曰水逆五苓散主之渴𣣔飲水不止者文蛤散主之文蛤散方文蛤四两右一味杵爲散以沸湯五合和服方寸匕淋之爲病小便如粟狀小腹弦急痛引臍中趺陽脉數胃中有熱即滿榖引食大便必堅小便即數淋家不可發汗發汗則必便血小便不利者有水氣其人若渴用後丸主之括蔞瞿麥丸括蔞根二两茯苓薯蕷各三两附子一枚炮瞿麥一两右五味末之煉蜜丸梧子大飲服三丸日三服不知増至七八丸以小便利腹中温為知小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之蒲灰散方蒲灰七分滑石二分右二味杵爲散飲服方寸匕日三服滑石白魚散滑石二分亂髮二分燒白魚二分右三味杵為散飲服半錢匙日三服茯苓戎鹽湯方茯苓半斤白术二两戎鹽弹丸大一枚右三味渴𣣔飲水口乾若燥者白虎加人參湯主之方見中􅠽中脉浮發熱渴𣣔飲水小便不利者猪苓湯主之猪苓湯方猪苓去皮茯苓阿膠滑石澤瀉各一两右五味以水四升先煮四味取二升去滓内膠洋消温服七合日三服水氣病脉證幷治第十四論七首脉證五條方十首師曰病有風水有皮水有正水有石水有黃汗風水其脉自浮外證骨節疼痛惡風皮水其脉亦浮外證腑腫按之没指不惡風其腹如皷不渴當發其汗正水其脉沉遲外證自喘石水其脉自沉外證腹滿不喘黃汗其脉沉遲身發熱胸滿四肢頭面腫攵不愈必致癰膿脉浮而洪浮則爲風洪則為氣風氣相摶風强則為隱疹身體為痒痒為泄風久為痂癩氣强則為水難以俛仰風氣相擊身體洪腫汗出則愈惡風則虚此為風水不惡風者小便通利上焦有寒其口多涎此為黄汗寸口脉沉滑者中有水氣面目腫大有熱名曰風水視人之目褁上㣲擁如蚕新卧起状其頸脉動時時欬按其手足上䧟而不起者風水太陽病脉浮而緊法當骨節疼痛及不疼身體反重而酸其人不渴汗出即愈此爲風水惡寒者此爲極虚發汗得之渴而不惡寒者此爲皮水身腫而冷状如周痺胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節欬而喘不渴者此為脾脹其状如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗裏水者一身面目黃腫其脉沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加术湯主之方見下趺陽脉當伏今反緊本自有寒疝瘕腹中痛醫反下之下之即胸滿短氣趺陽脉當伏今反數本自有熱消糓小便數今反不利此𣣔作水寸口脉浮而遲浮脉則熱遲脉則潜熱潜相摶名曰沈趺陽脉浮而數浮脉即熱數脉即止熱止相摶名曰伏沈伏相摶名曰水沈則絡脉虚伏則小便難虚難相摶水走皮膚即爲水矣寸口脉弦而緊弦則衛氣不行即惡寒水不沾流走於腸間少隂脉緊而沉緊則爲痛沉則為水小便即難脉得諸沉當責有水身體腫重水病脉出者死夫水病人目下有卧蚕面目鮮澤脉伏其人消渴病水腹水小便不利其脉沉絶者有水可下之問曰病下利後渴飲小便不利腹滿因腫者何也荅曰此法當病水若小便自利及汗出者自當愈心水者其身重而少氣不得卧煩而燥其人隂腫肝水者其腹大不能自轉則脇下腹痛時時津液㣲生小便續通脉水者其身腫小便難時下鴨溏脾水者其腹大四肢苦重津液不生但若少氣小便難腎水者其腹大臍腫腰痛不得溺隂下濕如牛鼻上汗其足逆冷面反瘦師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈師曰寸口脉沉而遲沉則為水遲則為寒寒水相摶趺陽脉伏水榖不化脾氣衰則䳱溏胃氣衰則身腫少陽脉卑少隂脉細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分問曰病者苦水面目身體四肢皆腫小便不利脉之不言水反言胸中痛氣上衝咽状如炙肉當㣲欬喘審如師言其脉何類師曰寸口脉沉而緊沉為水緊為寒沉緊相摶結在關元始時當㣲年盛不覺陽衰之後荣衛相干陽損隂盛結寒㣲動腎氣上衝喉咽塞噎脇下急痛醫以為留飲而大下之氣撃不去其病不除後重吐之胃家虚煩咽燥𣣔飲水小便不利水糓不化面目手足浮腫又與葶藶丸下水當時如小差食飲過度腫復如前胸脇苦痛象苦奔㹠其水揚溢則浮咳喘逆當先攻撃衞氣令止乃治欬欬止其喘自差先治新病病當在後風水脉浮身重汗出惡風者防已黃耆湯主之腹痛加芍藥防已黄耆湯方防巳一两黄耆一两一分白术三分甘草半两炙右剉每服五錢匕生姜四片棗一枚水盞半煎取八分去滓温服良乆再服風水急風一身悉腫脉浮不渴續自汗出無大熱越婢湯主之越婢湯方麻黄六两石膏半斤生姜三两大棗十五枚甘草二两右五味以水六升先煮麻黄去上沫内諸藥煮取三升分温三服惡風者加附子一枚炮風水加术四兩古今錄驗皮水為病四肢腫水氣在皮膚中四肢聶聶動者防已茯苓湯主之防巳茯苓湯防已三两黄耆三两桂枝三两茯苓六两甘草二两右五味以水六升煮取二升分温三服裏水越婢加术湯主之甘草麻黄湯亦主之越婢加术湯見上於内加白术四两又見脚氣中甘草麻黄湯甘草二两麻黄四两右二味以水五升先煮麻黄去上沫内甘草煮取三升温服一升重覆汗出不汗再服慎風寒水之為病其脉沈小属小隂浮者為風無水虚脹者為氣水其汗即已脉沈者冝麻黄附子湯浮者冝杏子湯麻黄}
