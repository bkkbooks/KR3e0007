body:
  text: 百合狐惑陰陽毒病脈證治第三論一首脈證三條方十一首論曰百合病者百脈一宗悉致其病也意欲食復不能食常默然欲臥不能臥欲行不能行飲食或有美時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月微見者各隨證治之百合病發汗後者百合知母湯主之百合知母湯方百合七枚擘知母三兩切右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎知母取一升去滓後合和煎取一升五合分溫再服百合病下之後者滑石代赭湯主之滑石代赭湯方百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫服百合病吐之後者用後方主之百合雞子湯方百合七枚擘雞子黃一枚右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內雞子黃攪勻煎五分溫服百合病不經吐下發汗病形如初者百合地黃湯主之百合地黃湯方百合七枚擘生地黃汁一升右以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內地黃汁煎取一升五合分溫再服中病勿更服大便當如漆百合病一月不解變成渴者百合洗方主之百合洗方右以百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也百合病渴不差者用後方主之括蔞牡蠣散方括蔞根牡蠣熬等分右為細末飲服方寸七日三服百合病變發熱者百合滑石散主之百合滑石散方百合一兩炙滑石三兩右為散飲服方寸匕日三服當微利者止服熱則除百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆狐惑之為病狀如傷寒熱默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲喝甘草瀉心湯主之甘草瀉心湯方甘草四兩黃芩人參乾姜各三兩黃連一一兩大棗十二枚半夏半升右七味水一斗煮取六升去滓再煎溫服一升日三服蝕於下部則咽乾苦參湯洗之苦參湯方苦參一升以水一斗煎取七升去滓薰洗日三服蝕於肛者雄黃熏之雄黃熏方雄黃右一味為末筒瓦二枚合之燒向肛熏之病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤小豆當歸散主之赤小豆當歸散方赤小豆三升浸令牙出曝乾當歸右二味杵為散漿水服方寸匕日三服陽毒之為病面赤班班如錦文咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之升麻鱉甲湯方升麻二兩當歸一兩蜀椒炒去汁一兩甘草二兩鱉甲手指大一片炙雄黃半兩研右六味以水四升煮取一升頓服之老小再服取汗
