body:
  text: 腹滿寒疝宿食病脈證治第十論一首脈證十六條方十五首趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去腹滿時減復如故此為寒當與溫藥病者痿黃躁而不渴胸中寒實而利不止者死寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也夫中寒家喜欠其人清涕出發熱色和者善嚏中寒其人下利以裏虛也欲嚏不能此人肚中寒夫瘦人繞臍痛必有風冷穀氣不行而反下之其氣必衝不衝者心下則痞也病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之厚朴七物湯方厚朴半斤甘草大黃各三兩大棗十枚枳實五枚桂枝二兩生姜五兩右七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生姜至半斤腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之附子粳米湯方附子一枚炮半夏半升甘草一兩大棗十枚粳米半升右五味以水八升煮米熟湯成去滓溫服一升日三服痛而閉者用後湯主之厚朴三物湯方厚朴八兩大黃四兩枳實五枚右三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度按之心下滿痛者此為實也當下之宜大柴胡湯主之大柴胡湯方柴胡半斤黃芩三兩芍藥二兩半夏半升洗枳實四枚炙大黃二兩大棗十二枚生姜五兩右八味以水一斗二升煮取六升去滓再煎溫服一升日三服腹滿不減減不足言當須下之宜大承氣湯大承氣湯方大黃四兩酒洗厚朴半斤去皮炙枳實五枚炙芒硝二合右四味以水一斗先煮二物取五升去滓內大黃煮取二升內芒硝更上火微一二沸分溫再服得下餘勿服心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近宜用後湯大建中湯方蜀椒二合炒去汗乾姜四兩人參二兩右三味以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜溫覆之脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜用後湯大黃附子湯方大黃三兩附子三枚炮細辛二兩右三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服寒氣厥逆赤丸主之赤丸方茯苓四兩半夏四兩洗一方用桂烏頭二兩炮細辛一兩右六味末之內真珠為色蜜煉丸如麻子大先食酒飲下三丸日再夜一服不知稍增之以知為度腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝寒疝遶臍痛苦發則白汗出手足厥冷其脈沉弦者大烏頭煎主之烏頭煎方烏頭大者五枚熬去皮不㕮咀右以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人服五合不差明日更服不可一日再服寒疝腹中痛及脅痛裏急者宜用後方當歸生姜羊肉湯方當歸三兩生姜五兩羊肉一斤右三味以水八升煮取三升溫服七合日三服若寒多者加生姜成一斤痛多而嘔者加橘皮二兩白朮一兩加生姜者亦加水五升煮取三升二合服之寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當用後方烏頭桂枝湯方烏頭右一味以蜜二斤煎減半去滓以桂枝湯五合解之令得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生姜三兩大棗十二枚右五味剉以水七升微火煮取三升去滓其脈數而緊乃弦狀如弓弦按之不移脈數弦者當下其寒脈緊大而遲者必心下堅脈大而緊者陽中有陰可下之附方外臺烏頭湯治寒疝腹中絞痛賊風入攻五臟拘急不得轉側發作有時使人陰縮手足厥逆外臺柴胡桂枝湯方治心腹卒中痛者柴胡四兩黃芩人參芍藥桂枝生姜各一兩半甘草一兩半夏二合大棗六枚右九味以水六升煮取三升溫服一升日三服外臺走馬湯治中惡心痛腹脹大便不通巴豆二枚去皮心熬杏仁二枚右二味以綿纏搥令碎熱湯二合捻取白汁飲之當下老小量之通治飛尸鬼擊病問曰人病有宿食何以別之師曰寸口脈浮而大按之及濇尺中亦微而濇故知有宿食大承氣湯主之脈數而滑者實此有宿食下之愈宜大承氣湯下利不飲食者有宿食也下之宜大承氣湯大承氣湯方宿食在上脘當吐之宜瓜蒂散瓜蒂散方瓜蒂一分熬黃赤小豆一分煮右二味杵為散以香豉七合煮取汁和散一錢七溫服之不吐者少加之以快吐為度而止脈緊如轉索無常者有宿食也脈緊頭痛風寒腹中有宿食不化也
