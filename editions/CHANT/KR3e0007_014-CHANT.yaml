body:
  text: 水氣病脈證并治第十四論七首脈證五條方十首師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證腑腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿脈浮而洪浮則為風洪則為氣風氣相搏風強則為隱疹身體為痒痒為泄風久為痂癩氣強則為水難以俛仰風氣相擊身體洪腫汗出則愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目褁上微擁如蠶新臥起狀其頸脈動時時欬按其手足上陷而不起者風水太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痺胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節欬而喘不渴者此為脾脹其狀如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗裏水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之趺陽脈當伏今反緊本自有寒疝瘕腹中痛醫反下之下之即胸滿短氣趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚即為水矣寸口脈弦而緊弦則衛氣不行即惡寒水不沾流走於腸間少陰脈緊而沉緊則為痛沉則為水小便即難脈得諸沉當責有水身體腫重水病脈出者死夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絕者有水可下之問曰病下利後渴飲水小便不利腹滿因腫者何也荅曰此法當病水若小便自利及汗出者自當愈心水者其身重而少氣不得臥煩而躁其人陰腫肝水者其腹大不能自轉則脅下腹痛時時津液微生小便續通肺水者其身腫小便難時下鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈師曰寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微欬喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝喉咽塞噎脅下急痛醫以為留飲而大下之氣繫不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小差食飲過度腫復如前胸脅苦痛象若奔㹠其水揚溢則浮該喘逆當先攻擊衛氣令止乃治欬欬止其喘自差先治新病病當在後風水脈浮身重汗出惡風者防己黃耆湯主之腹痛者加芍藥防己黃耆湯方防己一兩黃耆一兩一分白朮三分甘草半兩炙右剉每服五錢匕生姜四片棗一枚水盞半煎取八分去滓溫服良久再服風水急風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之越婢湯方麻黃六兩石膏半斤生姜三兩大棗十五枚甘草二兩右五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風者加附子一枚炮風水加朮四兩皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己茯苓湯方防己三兩黃耆三兩桂枝三兩茯苓六兩甘草二兩右五味以水六升煮取二升分溫三服裏水越婢加朮湯主之甘草麻黃湯亦主之越婢加朮湯方甘草麻黃湯方甘草二兩麻黃四兩右二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯麻黃附子湯方麻黃三兩甘草二兩附子一枚炮右三味以水七升先煮麻黃去上沫內諸藥煮取二升半溫服八分日三服杏子湯方厥而皮水者蒲灰散主之問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如藥汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜耆芍桂酒湯主之黃耆桂苦酒湯黃耆五兩芍藥三兩桂枝三兩右三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮臥盜汗出者此勞氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之桂枝加黃耆湯方桂枝芍藥各三兩甘草二兩生姜三兩大棗十二枚黃耆二兩右六味以水八升煮取三升溫服一升須臾飲熱稀粥一升餘以助藥力溫服取微汗若不汗更服師曰寸口脈遲而濇遲則為寒濇為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿脅鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷陰氣不通即骨痛陽前通則惡寒陰前通則痺不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分氣分心下堅大如盤邊如旋杯水飲所作用後方主之桂姜草棗黃辛附湯方桂枝三兩生姜三兩甘草二兩大棗十二枚麻黃細辛各二兩附子一枚炮右七味以水七升煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如虫行皮中即愈心下堅大如盤邊如旋盤水飲所作枳朮湯主之枳朮湯方枳實七枚白朮二兩右二味以水五升煮取三升分溫三服腹中耎即當散也附方外臺防己黃耆湯治風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和腰以下當腫及陰難以屈伸
