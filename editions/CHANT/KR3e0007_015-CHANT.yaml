body:
  text: 黃疸病脈證并治第十五論二首脈證十四條方七首寸口脈浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食穀即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰穀疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治心中懊憹而熱不能食時欲吐名曰酒疸陽明病脈遲者食難用飽飽則發煩頭痃小便必難此欲作穀疸雖下之腹滿如故所以然者脈遲故也夫病酒黃疸必小便不利其候心中熱足下熱是其證也酒黃疸者或無熱請言了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸心中熱欲嘔者吐之愈酒疸下之久久為黑疸目青面黑心中如噉蒜虀狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱所得然黃家所得從濕得之一身盡發熱面黃肚熱熱在裏當下之脈沉渴欲飲水小便不利者皆發黃腹滿舌痿黃燥不得睡屬黃家黃疸之病當以十八日為期治之十日以上瘥反極為難治疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔陽部其人振寒而發熱也穀疸之為病寒熱不食食即頭眩心胸不安久久發黃為穀疸茵陳湯主之茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩右三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也黃家日晡時發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治用後方消礬散方消石礬石燒等分右二味為末以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是候也酒黃疸心中懊憹或熱痛梔子大黃湯主之梔子大黃湯方梔子十四枚大黃二兩枳實五枚豉一升右四味以水六升煮取二升分溫三服諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之諸黃用後方豬膏髮煎方豬膏半斤亂髮如雞子大三枚右二味和膏中煎之髮消藥成分再服病從小便出黃疸病茵陳五苓散主之茵陳五苓散方茵陳稿末十分五苓散五分右二物和先食飲方寸匕日三服黃疸腹滿小便不利而赤自汗出此為表和裏實當下之宜大黃滑石湯大黃滑石湯方大黃黃檗滑石各四兩梔子十五枚右四味以水六升煮取二升去滓內滑石更煮取一升頓服黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之諸勞腹痛而嘔者宜柴胡湯男子黃小便自利當與虛勞小建中湯附方瓜蒂湯治諸黃千金麻黃醇酒湯治黃疸麻黃三兩右一味以美清酒五升煮取二升半頓服盡冬月用酒春月用水煮之
