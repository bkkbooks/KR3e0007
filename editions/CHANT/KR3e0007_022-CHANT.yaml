body:
  text: 婦人雜病脈證并治第二十二論一首脈證合十四條方十三首婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之婦人傷寒發熱經水適來晝日明了暮則讝語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈婦人中風發熱惡寒經水適來得七八日熱除脈遲身涼和胸脅滿如結胸狀讝語者此為熱入血室也當刺期門隨其假而取之陽明病下血讝語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出者愈婦人咽中如有炙臠半夏厚朴湯主之半夏厚朴湯方半夏一升厚朴三兩茯苓四兩生姜五兩乾蘇葉二兩右五味以水七升煮取四升分溫四服日三夜一服婦人藏躁喜悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之甘草小麥大棗湯方甘草二兩小麥一升大棗十枚右三味以水六升煮取三升溫分三服亦補脾氣婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之小青龍湯方瀉心湯方婦人之病因虛積冷結氣為諸經水斷絕至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與藏相連或結熱中病在關元脈數無瘡肌若魚鱗時著男子非止女身在下未多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冒狀如厥顛或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辯記勿謂不然問曰婦人年五十所病下利數十日不止暮即發熱少腹裏急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半產瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之溫經湯方吳茱萸三兩當歸芎藭芍藥各二兩人參桂枝阿膠牡丹皮去心生姜甘草各二兩半夏半升麥門冬一升去心右十二味以水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼取崩中去血或月水來過多及至期不來帶下經水不利少腹滿痛經一月再見者土瓜根散主之土瓜根散方土瓜根芍藥桂枝䗪虫各三分右四味杵為散酒服方寸匕日三服寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半產漏下旋覆花湯主之旋覆花湯方旋覆花三兩葱十四莖新絳少許右三味以水三升煮取一升頓服之婦人陷經漏下黑不解膠姜湯主之婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之大黃甘遂湯方大黃四兩甘遂二兩阿膠二兩右三味以水三升煮取一升頓服之其血當下婦人經水不利下抵党湯主之抵党湯方水蛭三十箇熬蝱虫三十枚熬去趐足桃仁二十箇去皮尖大黃三兩酒浸右四味為末以水五升煮取三升去滓溫服一升婦人經水閉不利藏堅癖不止中有乾血下白物礬石丸主之礬石丸方礬石三分燒杏仁一分右二味末之煉蜜和丸棗核大內藏中劇者再內之婦人六十二種風及腹中血氣刺痛紅藍花酒主之紅藍花酒方紅藍花一兩右一味以酒一大升煎減半頓服一半未止再服婦人腹中諸疾痛當歸芍藥散主之當歸芍藥散方婦人腹中痛小建中湯主之小建中湯方問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞絲了戾故致此病但利小便則愈宜腎氣丸主之腎氣丸方乾地黃八兩署蕷四兩山茱萸四兩澤瀉三兩茯苓三兩牡丹皮三兩桂枝附子炮各一兩右八味末之煉蜜和丸梧子大酒下十五丸加至二十五丸日再服蛇床子散方溫陰中坐藥蛇床子仁右一味末之以白粉少許和令相得如棗大綿裹內之自然溫少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之狼牙湯方狼牙三兩右一味以水四升煮取半升以綿纏筯如繭浸湯瀝陰中日四遍胃氣下泄陰吹而正喧此穀氣之實也膏髮煎導之膏髮煎方小兒疳虫蝕齒方雄黃葶藶右二味末之取臘日豬脂鎔以槐枝綿裹頭四五枚點藥烙之
