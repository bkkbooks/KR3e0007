front:
  text: 新編金匱要畧方論序張仲景為傷寒雜病論合十六卷今世但傳傷寒論十卷雜病未見其書或於諸家方中載其一二矣翰林學士王洙在舘閣日於蠧簡中得仲景金匱玉函要畧方三卷上則辯傷寒中則論雜病下則載其方幷療婦人乃錄而傳之士流纔數家耳嘗以對方證對者施之於人其効若神然而或有證而無方或有方而無證救疾治病其有未備國家詔儒臣校正醫書臣竒先校定傷寒論次校定金匱玉函經今又校成此書仍以逐方次於證候之下使倉卒之際便於檢用也又採散在諸家之方附於逐篇之末以廣其法以其傷寒支多節畧故取自雜病以下終於飲食禁忌凡二十五篇除重復合二百六十二方勒成上中下三卷依舊名曰金匱方論臣竒嘗讀魏志華佗傳云出書一卷曰此書可以活人毎觀華佗凡所療病多尚竒怪不合聖人之經臣竒謂活人者必仲景之書也大哉炎農聖法属我盛旦恭惟主上丕承大統撫肓元元頒行方書拯濟疾苦使和氣盈溢而萬物莫不盡和矣
  hash: sha256:0f732e4283dc002e24ee47f8055cc2d27b4dd9bed71fcda3e7e3a3698296e541
