body:
  text: 太子右賛善大夫臣高保衡尚書都官員外郎臣孫竒尚書司封郎中充秘閣校理臣林億等傳上仲景金匱錄岐黄素難之方近將千卷患其混雜煩重有求難得故周流華裔九州之内收合竒異捃拾遺逸㨂選諸經筋髓以為方論一編其諸救療暴病使知其次第凡此藥石者是諸仙之所造服之將来固無夭横或治療不早或𬒳師誤幸具詳焉宋學士王洙得是書於蠧簡林億等雖校理重刻元金以来世寡經見諸家或載金匱方治多於他書中得之耳不然何未有一人能語其㒹末者嗟予小子幸獲伏讀敢不寳惜山南真逸俞橋識新編金匱要畧方論目録卷之上臟腑經絡先後第一痓濕􅠽第二括樓桂枝湯葛根湯麻黄杏仁湯大承氣湯麻黃加术湯桂枝附子湯白术附子湯甘草附子湯白虎人參湯瓜蒂散防己黄耆湯百合狐惑隂陽毒第三百合知母湯滑石代赭湯百合雞子湯百合地黃湯百合洗方括樓牡蠣散百合滑石散甘草瀉心湯雄黃燻方赤小豆當歸散升麻鱉甲湯瘧病第四鱉甲煎丸白虎加桂枝湯蜀􅃮散附方牡蠣湯柴胡去半夏加括樓湯柴胡桂姜湯中風歷節第五侯氏黒散風引湯防風地黃湯頭風摩散桂枝芍藥知母湯烏頭湯礬石湯附方續命湯三黃湯术附湯八味圓越婢加术湯血痺虚劳第六桂枝五物湯桂枝加龍骨牡蠣湯天雄散小建中湯黃茋建中湯大黃􅟟䖝丸酸棗湯署預丸附方炙甘草湯獺肝散肺痿肺癰咳嗽上氣第七甘草乾姜湯射干麻黃湯皂莢丸厚朴麻黄湯澤漆湯麥門冬湯葶藶大棗瀉肺湯桔梗湯越婢加半夏湯小青龍加石膏湯附方生姜甘草湯生姜湯桂枝湯桔梗白散葦莖湯奔㹠氣第八奔㹠湯桂枝加桂湯茯苓桂枝甘草大棗湯胸痺心痛短氣第九括樓薤白酒湯括樓薤白半夏湯枳實薤白桂枝湯人參湯茯苓杏仁甘草湯橘皮枳實生姜湯薏苡附子湯桂枝生姜枳實湯赤石脂丸九痛丸腹滿寒疝宿食第十厚朴七物湯附子粳米湯厚朴三物湯大柴胡湯大承氣湯大建中湯大黃附子湯赤丸烏頭煎當歸生姜羊肉湯烏頭桂枝湯桂枝湯附方瓜蒂散柴胡桂枝湯走馬湯卷之中五臟風寒積聚第十一麻子仁丸甘草乾姜茯苓白术湯痰飲咳嗽第十二茯苓桂枝白术甘草湯五苓散甘遂半夏湯十棗湯大青龍湯小青龍湯术防己湯术防巳加茯苓芒硝湯澤瀉湯厚朴术黃湯小半夏湯防巳椒目葶歷大黃丸小半夏加茯苓湯附方茯苓飲茯苓桂枝五味甘草湯茯甘五味姜辛湯桂苓去桂加姜辛夏湯茯芍姜味辛仁湯茯甘姜味辛夏仁湯消渇小便利淋第十三文蛤散括蔞瞿麥丸蒲灰散滑石白魚散茯苓戎塩湯猪苓湯水氣病第十四防巳黄耆湯越婢湯防巳茯苓湯甘草麻黄湯附子麻黄湯杏子湯黄耆芍藥桂枝苦酒湯桂枝加黄耆湯桂姜草棗黄辛附湯枳實木湯黄疸病第十五茵陳蒿湯消石礬石散梔枳大黄湯猪膏髪煎茵陳五苓散大黄黄蘗梔硝湯附方麻黄醇酒湯驚悸吐衂下血胸滿瘀血第十六桂枝去芍藥加蜀漆牡蠣龍骨救逆湯半夏麻黃丸柏葉湯黃土湯瀉心湯嘔吐藏下利第十七茱茰湯半夏瀉心湯黃苓加半夏生姜湯猪苓散四逆湯小柴胡湯大半夏湯大黃甘草湯茯苓澤瀉湯文蛤湯半夏乾姜散生姜半夏湯橘皮湯橘皮竹茹湯四逆湯桂枝湯小承氣湯桃花湯白頭翁湯梔子豉湯通脉四逆湯紫參湯訶梨勒散附方黃芩湯瘡癰腸癰浸淫第十八薏苡附子敗醤散大黃牡丹湯王不留行散排膿散跌蹷手指臂膞轉筋隂狐疝蚘䖝第十九雞屎白散蜘蛛散甘草粉蜜湯烏梅丸卷之下婦人姙娠第二十桂枝茯苓丸膠艾湯當歸芍藥散乾姜人參半夏丸當歸貝毋苦參丸葵子茯苓散當歸散白术散婦人産後病第二十一枳實芍藥散下瘀血湯竹葉湯白頭翁加甘草阿膠湯竹皮大丸附方三物黃苓湯内𥙷當歸建中湯婦人雜病第二十二半夏厚朴湯甘草小麥湯温經湯土瓜根湯蔙復花湯大黃甘遂湯抵當湯礬石丸紅藍花酒當歸芍藥散小兒疳䖝蝕齒方蛇床子散狼牙湯雜療第二十三四時加减柴胡飲長服訶梨勒丸三物備急丸紫石寒食散救卒死方共五方救卒死而壮熱方救卒死而目閉者方救卒死而張口反折者方救卒死而四肢不收失便方治尸蹷方共二方救小兒卒死而吐利不知何病方救卒死客忤方二方救自縊死方療中􅠽方救溺死方馬墜及一切筋骨損方禽獸䖝魚禁忌第二十四治自死六畜肉中毒治食欝肉漏脯中毒方治食生肉中毒方治黍米中藏乾脯食之中毒方冶食六畜鳥獸肝中毒方治馬肝毒中人未死方二治食馬肉中毒𣣔死方二治食噉蛇牛肉𣣔死方三治食牛肉中毒方治食犬肉不消成病方治食鳥獸中箭肉毒方治食鱠不化成癥病方二冶食魚後食毒兩種煩亂方治食鯸鮧魚中毒方治食蠏中毒方二菓實菜榖禁忌第二十五治食諸菓中毒方食諸􅌲中毒悶亂𣣔死方食躁或躁方治誤食鈎吻殺人解之方冶誤食水茛菪中毒治食芹菜中龍精毒方治食苦瓠中毒方治凡飮食中毒方貪食食多不消必腹堅滿痛治之方新編金匱要畧方論目録終
