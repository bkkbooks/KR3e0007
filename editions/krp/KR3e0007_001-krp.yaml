甘草四两炙乾姜二两炮右㕮咀以水三升煮取一升五合去滓分温再服欬而上氣喉中水鷄聲射干麻黄湯主之射干麻黄湯方射干十三枚一法三两麻黄四两生姜四两細辛紫苑欵冬花各三两五味子半升大棗七枚半夏大者洗八枚一法半斤右九味以水一斗二升先煮麻黄两沸去上沫内諸藥煮取三升分温三服欬逆上氣時時唾濁但坐不得服皂莢丸主之皂莢丸方皂莢八两刮去皮用酥炙右一味未之蜜丸梧子大以棗膏和湯服三丸日三夜一服欬而脉浮者厚朴麻黄湯主之厚朴麻黄湯方厚朴五两麻黄四两石膏如鷄子大杏仁半升半夏半升乾姜二两細辛二两小麥一升五味子半升右九味以水一斗二升先煮小麥熱去滓内諸藥煮取三升温服一升日三服脉沉者澤􅃮湯主之澤􅃮湯方半夏半升紫參五两一作紫苑澤􅃮三斤以東流水五斗煮取斗五生姜五两白前五两甘草黃芩人參桂枝各三两右九味㕮咀内澤漆汁中煮取五升温服五合至夜盡大逆上氣咽喉不利止逆下氣者麥門冬湯主之麥門冬湯方麥門冬七升半夏一升人參二两甘草二两粳米三合大棗十二枚右六味以水一斗二升煮取六升温服一升日三夜一服肺癰喘不得卧葶藶大棗瀉肺湯主之葶藶大棗瀉肺湯方葶藶炙令黄色搗丸如弹丸大大棗十二枚右先以水三升煮棗取二升去棗内葶藶煮取一升頓服欬而胸滿振脉寒數咽乾不渇時出濁唾腥臭乆乆吐膿如米粥者爲肺癰桔便湯主之桔梗湯方亦治血痺桔梗一两甘草二两右二味以水三升煮取一升分温再服則吐膿血色欬而上氣此爲肺脹其人喘目如脫狀脉浮大者越婢加半夏湯主之越婢加半夏湯方麻黄六两石膏半斤生姜三两大棗十五枚甘草二两半夏半升右六味以水六升先煮麻黄去上沬内諸藥煮取一升分温三服肺脹欬而上氣煩燥而喘脉浮者心下有水小青龍加石膏湯主之小青龍加石膏湯方千金證治同外䑓加脇下痛引缺盆麻黄芍藥桂枝細辛甘草乾姜各三两五味子半夏各半升石膏二两右九味以水一斗先煮麻黄去上沬内諸藥煮取三升强人服一升羸者減之日三服小兒服四合附方外䑓炙甘草湯治肺痿涎唾多心中温温液液者覩千金甘草湯甘草右一味以水三升煮減半分温三服千金生姜甘草湯治肺痿欬唾涎沫不止咽燥而渇生姜五两人參二两甘草四两大棗十五枚右四味以水七升煮取三升分温三服千金桂枝去芍藥加皂莢湯治肺痿吐涎沫桂枝生姜各三两甘草二两大棗十枚皂莢二枚去皮子炙焦右五味以水七升㣲㣲大煮取三升分温三服外䑓桔梗白散治欬而胸滿振寒脉數咽乾不渇時出濁唾腥臭乆乆吐膿如米粥者爲肺癰桔梗貝毋各三分巴豆一分去皮熬研如脂右三味爲散強人飲服半錢匕羸者减之病在膈上者吐膿血膈下者瀉出若下多不止飲冷水一盃千金葦莖湯治欬有㣲熱煩滿胸中甲錯是爲肺癰葦莖二升薏苡仁半升桃仁五十枚瓜辦半升右四味以水一斗先煮葦莖得五升去滓内諸藥煮取二升服一升再服當吐如膿肺癰胸滿脹一身面目浮腫鼻塞淸涕出不聞香臭酸辛欬逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之方見上三日一劑可至三四劑此先服小青龍湯一劑乃進小青龍方見欬嗽門中奔㹠氣病脉證治第八論二首方三首師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之師曰奔豚病從小腹起上衝咽喉發作𣣔死復還止皆從驚恐得之奔豚氣上衝胸腹痛徃来寒熱奔豚湯主之奔豚湯方甘草芎藭當歸各二两半夏四两黃芩二两生葛五两芍藥二两生姜四两甘李根白皮一升右九味以水二斗煮取五升温服一升日三夜一服發汗後燒針令其汗針處𬒳寒核起而赤者必發賁豚氣從小腹上至心炙其核上各一壮與桂枝加桂湯主之桂枝加桂湯方桂枝五两芍藥三两甘草三两炙生姜三两大棗十二枚右五味以水七升㣲火煮取三升去滓温服一升發汗後臍下悸者𣣔作賁豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤甘草二两炙大棗十五枚桂枝四两右四味以甘爛水一斗先煮茯苓减二升内諸藥煮取三升去滓温服一升日三服甘爛水法取水二斗置大盆内以杓揚之水上有珠子五六十顆相逐取用之胸痺心痛短氣病脉證治第九論一首脉證一條方十首師曰夫脉當取太過不及陽㣲隂弦即胸痺而痛所以然者責其極虚也今陽虚知在上焦所以胸痺心痛者以其隂弦故也平人無寒熱短氣不足以息者實也胸痺之病喘息欬唾胸背痛短氣寸口脉沉而遲関上小緊數用後方主之括蔞薤白白酒湯方括蔞實一枚搗薤白半升白酒七升右三味同煮取二升分温再服胸痺不得卧心痛徹背者括蔞薤白半夏湯主之括蔞薤白半夏湯方括蔞實一枚薤白三两半夏半斤白酒一斗右四味同煮取四升温服一升日三服胸痺心中痞留氣結在胸􅎍滿脇下逆槍心枳實薤白桂枝湯主之人參湯亦主之枳實四枚厚朴四两薤白半斤桂枝一两括蔞一枚搗右五味以水五升先煮枳實厚朴取一升去滓内諸藥煮數沸分温三服人參湯方人參甘草乾姜白术各三两右四味以水八升煮取三升温服一升日三服胸痺胸中氣寒短氣茯苓杏仁甘草湯主之橘枳姜湯亦主之茯苓杏仁甘草湯方茯苓三两杏仁五十箇甘草一两右三味以水一斗煮取五升温服一升日三服不差更服橘枳姜湯方橘皮一斤枳實三两生姜半斤右三味以水五升煮取二升分温再服肘後千金云治胸痺胸中福海如滿噎塞習習如痒喉中澁唾燥沬胸痺緩急者用後方主之薏苡附子散方薏苡仁十五两大附子十枚炮右二味杵爲散服方寸匙日三服心中痞諸逆心懸痛桂枝生姜枳實湯主之桂姜枳實湯方桂枝生姜各三两枳實五枚右三味以水六升煮取三升分温三服心痛徹背背痛徹心烏頭赤石脂丸主之赤石脂丸方蜀椒一两一法二分烏頭一分炮附子半两炮一法一分乾姜一两一法一分赤石脂一两一法二分右五味末之蜜丸如梧子大先食服一丸日三服九痛丸治九種心痛附子三两炮生狼牙一两炙香巴豆一两去皮心熬研如脂人參乾姜吳茱茰各一两右六味沬之煉蜜丸如梧子大酒下強人𥘉服三丸日三服弱者二丸兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛并冷腫上氣落馬墜車血疾等皆主之忌口如常法腹滿寒疝宿食病脉證治第十論一首脉證十六條方十五首趺陽脉㣲弦法當腹滿不滿者必便難两胠疼痛此虚寒從下上也當以温藥服之病者腹滿按之不痛為虚痛者為實可下之舌黄未下者下之黄自去腹滿時减復如故此爲寒當與温藥病者痿黄躁而不渇胸中寒實而利不止者死寸口脉弦者即脇下拘急而痛其人嗇嗇惡寒也夫中寒家喜欠其人清涕出發熱色和者善嚏中寒其人下利以裏虚也𣣔嚏不能此人肚中寒一云痛夫瘦人繞臍痛必有風冷榖氣不行而反下之其氣必衝不衝者心下則痞也病腹滿發熱十日脉浮而數飲食如故厚朴七物湯主之厚朴七物湯方厚朴半斤甘草大黄各三两大棗十枚枳實五枚桂枝二两生姜五两右七味以水一斗煮取四升温服八合日三服嘔者加半夏五合下利去大黄寒多者加生姜至半斤腹中寒氣雷鳴切痛胸脇逆滿嘔吐附子粳米湯主之附子粳米湯方附子一枚炮半夏半升甘草一两大棗十枚粳米半升右五味以水八升煮米熟湯成去滓温服一升日三服痛而閉者用後湯主之厚朴三物湯方厚朴八两大黄四两枳實五枚右三味以水一斗二升先煮二味取五升内大黄煮取三升温分一升以利爲度按之心下滿痛者此爲實也當下之宜大柴胡湯主之大柴胡湯方柴胡半斤黄芩三两芍藥二两半夏半升洗枳實四枚大棗二两大棗十二枚生姜五两右八味以水一斗二升煮取六升去滓再煎温服一升日三服腹滿不減減不足言當湏下之冝大承氣湯大承氣湯方大黄四两酒洗厚朴半斤去皮炙枳實五枚炙芒硝二合右四味以水一斗先煮二物取五升去滓内大黄煮取二升内芒硝更上火㣲一二沸分温再服得下餘勿服心胸中大寒痛嘔不能飮食腹中寒上衝皮起出見有頭足上下痛而不可觸近冝用後湯大建中湯方蜀椒二合汁乾姜四两人參二两右三味以水四升煮取二升去滓内膠飴一升㣲火煎取一升半分温再服如一炊頃可飲粥二升後更服當一日食糜温覆之脇下偏痛發熱其脉緊弦此寒也以温藥下之冝用後湯大黄附子湯方大黄三两附子三枚炮細辛二两右三味以水五升煮取二升分温三服若强人煮取二升半分温三服服後如人行四五里進一服寒氣厥逆赤丸主之赤丸方茯苓四两半夏四两洗方用桂烏頭二两炮細辛一两千金作人參右六味末之内真珠爲色蜜煉丸如麻子大先食酒飮下三丸日再夜一服不知稍増之以知爲度腹痛脉弦而緊弦則衛氣不行即惡寒緊則不𣣔食邪正相摶即爲寒疝寒疝遶臍痛苦發則白汗出手足厥冷其脉沉弦者大烏頭煎主之烏頭煎方烏頭大者五枚熬去皮不㕮咀右以水三升煮取一升去滓内蜜二升煎令水氣盡取二升强人服七合弱人服五合不差明日更服不可日再服寒疝腹中痛及脇痛裏急者冝用後方當歸生姜羊肉湯方當歸三两生姜五两羊肉一斤右三味以水八升煮取三升温服七合日三服若寒多者加生姜成一斤痛多而嘔者加橘皮二两白术一两加生姜者亦加水五升煮取三升二合服之寒疝腹中痛逆冷手足不仁若身疼痛炙刺諸藥不能治抵當用後方烏頭桂枝湯方烏頭右一味以蜜二斤煎减半去滓以桂枝湯五合解之得一升後𥘉服二合不知即服三合又不知復加至五合其知者如醉狀得吐者爲中病桂枝湯方桂枝三两去皮芍藥三两甘草二两炙生姜三两大棗十二枚右五味剉以水七升㣲火煮取三升去滓其脉數而緊乃弦狀如弓弦按之不移脉數弦者當下其寒脉緊大而遲者必心下堅脉大而緊者陽中有隂可下之附方外䑓烏頭湯治寒疝腹中絞痛賊風入攻五臟拘急不得轉側發作有時瘦人隂縮手足厥逆方見上外䑓柴胡桂湯方治心腹卒中痛者柴胡四两黄芩人參芍藥桂枝生姜各一两半甘草一两半夏二合大棗六枚右九味以水六升煮取三升温服一升日三服外䑓走馬湯治中惡心痛腹脹大便不通巴豆二枚去皮心熬杏仁二枚右二味以綿纏搥令碎熱湯二合捻取白汁飲之當下老小量之通冶飛尸鬼撃病問曰人病有宿食何以别之師曰寸口脉浮而大按之及濇尺中亦㣲而濇故知有宿食大承氣湯主之脉數而滑者實此有宿食下之愈宜大承氣湯下利不飲食者有宿食也下之宜大承氣湯大承氣湯方見前痓病中宿食在上脘當吐之冝瓜蒂散瓜蒂散方瓜蒂一分熬黄赤小豆一分煮右二味杵爲散以香豉七合煮取汁和散一錢匙温服之不吐者少加之以快吐爲度而止亡血及虚者不可與之脉緊如轉索無常者有宿食也脉緊頭痛風寒腹中有宿食不化也一云寸口脉緊新編金匱要畧方論卷上
