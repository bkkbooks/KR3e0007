front:
  text: 新編金匱要畧方論卷之上
  hash: sha256:650587fa88ab452839e71252553eb46d7d3448ce5acc7aad8da504c22bbbba7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0007_SBCK_001-1a}
body:
  text: 尚書司封郎中充秘閣校理臣林億等詮次晉王叔和集漢張仲景述臟腑經絡先後病脉證第一論十三首脉證二條問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不暁相傳見肝之病不解實脾惟治肝也夫肝之病補用醋助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣㣲弱則水不行水不行則心火氣盛心火氣盛則傷肺肺𬒳傷則金氣不行金氣不行則肝氣盛故實脾則肝自愈此治肝補脾之要妙也肝虚則用此法實則不在用之經曰虚虚實實𥙷不足損有餘是其義也餘藏准此夫人禀五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五臟元真通暢人即安和客氣邪風中人多死千般灾難不越三條一者經絡受邪入臟腑爲内所因也二者四肢九竅血脉相傳壅塞不通爲外皮膚所中也三者房室金刃蟲獸所傷以凡詳之病由都盡若人能養慎不令邪風干忤經絡適中經絡未流傳腑臓即醫治之四肢才覺重滯即導引吐納鍼炙膏摩勿令九竅閉塞更能無犯王法禽獸灾傷房室勿令竭之服食節其冷熱苦酸辛甘不遺形體有衰病則無由入其腠理腠者是三焦通㑹元眞之處爲血氣所注理者是皮膚臟腑之文理也問曰病人有氣色見於面部願聞其說師曰鼻頭色青腹中痛苦冷者死一云腹中冷苦痛者死鼻頭色㣲黒者有水氣色黃者胸上有寒色白者亡血也設㣲赤非時者死其目正圓者痊不治又色青爲痛色黒爲劳色赤爲風色黃者便難色鮮明者有留飲師曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病一作痛師曰息摇肩者心中堅息引胸中上氣者欬息張口短氣者肺痿唾沬師曰吸而㣲數其病在中焦實也當下之即愈虚者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動摇振振者不治師曰寸口脉動者因其王時而動假令肝王色青四時各随其色肝色青而反色白非其時色脉皆當病問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得温和以未得甲子天因温和此爲未至而至也以得甲子而天未温和此爲至而不至也以得甲子而天大寒不解此爲至而不去也以得甲子而天温如盛夏五六月時此爲至而太過也師曰病人脉浮者在前其病在表浮者在後其病在裏腰痛背强不能行必短氣而極也問曰經云厥陽獨行何謂也師曰此爲有陽無隂故稱厥陽問曰寸脉沉大而滑沉則爲實滑則爲氣實氣相傳血氣入臟即死入腑即愈此爲卒厥何謂也師曰唇口青身冷爲入臟即死如身和汗自出爲入腑即愈問曰脉脫入臟即死入腑即愈何謂也師曰非爲一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流来入口者不可治病在外者可治入裏者即死問曰陽病十八何謂也師曰頭痛項腰脊臂脚掣痛隂病十八何謂也師曰欬上氣喘噦咽腸鳴脹滿心痛拘急五臟病各有十八合爲九十病人又有六㣲㣲有十八病合爲一百八病五劳七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中裏䅽飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮􅊜傷於下霧傷於上風令脉浮寒令脉急霧傷皮腠􅊜流關節食傷脾胃極寒傷經極熱傷絡問曰病有急當救裏救表者何謂也師曰病醫下之續得下利清榖不止身體疼痛者急當救裏後身體疼痛清便自調者急當救表也夫病痼疾加以卒病當先治其卒病後乃治其痼疾也師曰五臓病各有得者愈五臓病各有所惡各隨其所不喜者爲病病者素不應食而反暴思之必發熱也夫諸病在臟𣣔攻之當隨其所得而攻之如渴者與猪苓湯餘皆倣此痓濕暍病脉證治第二論一首脉證十二條方十一首太陽病發熱無汗反惡寒者名曰剛痓一作痓餘同太陽病發熱汗出而不惡寒名曰柔痓太陽病發熱脉沉而細者名曰痓爲難治太陽病發汗太多因致痓夫風病下之則痓復發汗必拘急瘡家雖身疼痛不可發汗汗出則痓病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動摇卒口噤背反張者痓病也若發其汗者寒􅊜相得其表益虚即惡寒甚發其汗巳其脉如蛇一云其脉滄滄暴腹脹大者爲𣣔解脉如故反伏弦者痓夫痓脉按之緊如弦直上下行一作築築而弦脉經云痓家其脉伏堅直上下痓病有炙瘡難治脉經云痓家其脉伏堅直上下太陽病其證備身體強几几然脉反沉遲此爲痓括樓桂枝湯主之括蔞桂枝湯方括蔞根二兩桂枝三兩芍藥三兩甘草二兩生姜三兩大棗十二枚右六味以水九升煮取三升分温三服取㣲汗汗不出食頃啜熱粥發之太陽病無汗而小便反少氣上衝胸口噤不得語𣣔作剛痓葛根湯主之葛根湯方葛根四两麻黃三两去節桂二两去皮芍藥二两甘草二两炙生姜三两大棗十二枚右七味㕮咀以水一升先煮麻黃葛根减二升去沫内諸藥煮取三升去滓温服乙升覆取㣲似汗不湏啜粥餘如桂枝湯法將息及禁忌痓爲病一本痓字上有剛字胸滿口噤卧不着席脚挛急必齘齒可與大承氣湯大承氣湯方大黃四两酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合右四味以水一斗先煮二物取五升去滓内大黃煮取二升去滓内芒硝更上火㣲一二弗分温再服得下止服太陽病関節疼痛而煩脉沉而細一作緩者此名濕痺玉函云中濕濕痺之候小便不利大便反快但當利其小便濕家之爲病一身盡疼一云疼煩發熱身色如熏黃也濕家其人但頭汗出背强𣣔得𬒳覆向火若下之早則噦或胸滿小便不利一云利舌上如胎者以丹曰有熱胸上有寒渇𣣔得飲而不能飲則口燥煩也濕家下之額上汗出㣲喘小便利一云不利者死若下利不止者亦死風濕相摶一身盡疼痛法當汗出而解值天隂雨不止醫云此可發汗汗之病不愈者何也盖發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但㣲㣲似𣣔出汗者風濕俱去也濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脉大自能飮食腹中和無病病在頭中寒濕故鼻寒内藥鼻中則愈脉經云病人喘而無濕家病以下至而喘十三字濕家身煩疼可與麻黃加木湯發其汗爲宜慎不可以火攻之麻黄加术湯方麻黃三两去節桂枝二两去皮甘草二两炙杏仁七十箇去皮尖白术四两右五味以水九升先煮麻黄减二升去上沫内諸藥煮取二升半去滓温服八合覆取㣲似汗病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或乆傷取冷所致也可與麻黃杏仁薏苡甘草湯麻黃杏仁薏苡甘草湯方麻黃去節半两湯泡甘草一两炙薏苡仁半两杏仁十箇去皮火炒右剉麻豆大毎服四錢七水盞半煮八分去滓温服有㣲汗避風風濕脉浮身重汗出惡風者防巳黃耆湯主之防巳黃耆湯方防巳一两甘草半两炒白术七錢半黃耆一两一分去蘆右剉麻豆大毎抄五錢匕生姜四片大棗一枚水盡半煎八分去滓温服良乆再服喘者加麻黃半两胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如䖝行皮中從腰下如氷後坐𬒳上乆以一𬒳繞腰以下温令㣲汗差傷寒八九日風濕相摶身體疼痛不能自轉側不嘔不渇脉浮虚而濇者桂枝附子湯主之若大便堅小便自利者去桂加白术湯主之桂枝附子湯方桂枝四两去皮生姜三两切附子三枚炮去皮破八片甘草二两炙大棗十二枚孹右五味以水六升煮取二升去滓分温三服白术附子湯方白术二两附子一放半炮去皮甘草一两炙生姜一两半切大棗六枚右五味以水三升煮取一升去滓分温三服一服覺身痺半日許再服三服都盡其人如冐狀勿怪即是术附竝走皮中逐水氣未得除故耳風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不𣣔去衣或身㣲腫者甘草附子湯主之甘草附子湯方甘草二两炙附子二枚炮去皮白术二两桂枝四两去皮右四味以水六升煮取三升去滓温服一升日三服𥘉服得㣲汗則解能食汗出復煩者服五合恐一升多者服六七合爲妙太陽中暍發熱惡寒身重而疼痛其脉弦細芤遲小便巳洒洒然毛聳手足逆冷小有劳身即熱口前開板齒燥若發其汗則其惡寒甚加温針則發熱甚數下之則淋甚太陽中熱者暍是也汗出惡寒身熱而渇白虎加人參湯主之白虎人參湯方知母六两石膏一斤碎甘草二两粳米六合人參三两右五味以水一斗煮米熱湯成去滓温服一升日三服太陽中暍身熱疼重而脉㣲弱此以夏月傷冷水水行皮中所致也一物苽蒂湯主之一物苽蒂湯方苽蒂二七箇右剉以水一升煮取五合去滓頓服百合狐惑隂陽毒病證治第三論一首脉證三條方十一首論曰百合病者百脉一宗悉致其病也意𣣔食復不能食常黙然𣣔卧不能卧𣣔行不能行飲食或有羙時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脉㣲數毎溺時頭痛者六十日乃愈若溺時頭不痛浙然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月㣲見者各隨證治之百合病發汗後者百合知母湯主之百合知毋湯方百合七枚擘知毋三两切右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎知毋取一升去滓後合和煎取一升五合分温再服百合病下之後者滑石代赭湯主之滑石代赭湯方百合七枚擘滑石三两碎綿囊代赭石弹大一枚綿褁右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分温服百合病吐之後者用後方主之百合雞子湯方百合七枚擘雞子黃一枚右先以水洗百合漬一宿當白沬出去其水更以泉水二升煎取一升去滓内雞子黃攪匀煎五分温服百合病不經吐下發汗病形如𥘉者百合地黄湯主之百合地黃湯方百合七枚擘生地黃汁一升右以水洗百合漬一宿當白沬出去其水更以泉水二升煎取一升去滓内地黄汁煎取一升五合分温再服中病勿更服大便常如漆百合病一月不解變成渴煮百合洗方主之百合洗方右以百合一升以水一斗漬之一宿以洗身洗巳食煮餅勿以塩豉也百合病渇不差者用後方主之括蔞牡蠣散方括蔞根牡蠣熬等分右爲細末飲服方寸匕日三服百合病變發熱者二作發寒熱百合滑石散主之百合滑石散方百合一两炙滑石三两右爲散飮服方寸匕日三服當㣲利者止服熱則除百合病見於隂者以陽法救之見於陽者以隂法救之見陽攻隂復發其汗此爲逆見隂攻陽乃復下之此亦爲逆狐惑之爲病狀如傷寒熱默𣣔眠目不得閉卧起不安蝕於喉爲惑蝕於隂爲狐不𣣔飲食惡聞食臭其面目乍赤乍黒乍白蝕於上部則聲喝一作嗄甘草㵼心湯主之甘草㵼心湯方甘草四两黃芩人參乾姜各三两黃連九两大棗十二枚半夏半斤右七味水一斗煮取六升去滓再煎温服一升日三服蝕於下部則咽乾苦參湯洗之蝕於肛者雄黄熏之雄黄熏方右一味爲末筒瓦二枚合之燒向肛熏方脉經云病人或從呼吸上蝕其咽或從下焦飲其肛隂蝕上爲惑飲下爲狐狐惑病者猪苓散主之病者脉數無熱㣲煩黙黙但𣣔卧汗出𥘉得之三四日目赤如鳩眼七八日目四眥一本此有黄字黒若能食者膿巳成也赤豆當歸散主之赤小豆當歸散方赤小豆三升浸令牙出曝乾當歸右二味杵爲散漿水服方寸匕日三服陽毒之爲病面赤班班如錦文咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之隂毒之爲病面目青身痛如𬒳杖咽喉痛五日可冶七日不可治升麻鱉甲湯去雄黄蜀椒主之升麻鱉甲湯方升麻二两當歸一两蜀椒炒去汁两甘草二两鱉甲手指大一片炙雄黄半两研右六味以水四升煮取一升頓服之老小再服取汗肘後千金方陽毒用升麻湯無鱉甲有桂隂毒用甘草湯無雄黄瘧病脉證幷治第四證二條方六首師曰瘧脉自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可温之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之病瘧以月一日發當以十五日愈設不差當月盡解如其不差當去何師曰此結爲癥瘕名曰瘧母急治之冝鱉甲煎丸鱉甲煎丸方鱉甲十二分炙烏扇三分燒黃芩三分柴胡六分鼠婦三分熬乾姜二分大黃三分芍藥五分桂枝三分葶藶一分熬石韋三分去毛厚朴三分牡丹五分去心瞿麥二分紫盛三分半夏一分人參一分䖝五分熬附膠三分炙蜂巢四分炙赤消十二分蜣蜋六分熬桃仁二分右二十三味爲末取鍜竈下灰一斗淸酒一斛五斗浸灰候酒盡一半着鱉甲於中煮令泛爛如膠􅃮絞取汁内諸藥煎爲丸如梧子大空心服七丸日三服千金方用鱉甲十二片又以海藻三分大㦸一分䖝五分無鼠婦赤消二味以鱉甲煎和諸藥爲丸師曰隂氣孤絶陽氣獨發則熱而少氣煩冤手足熱而𣣔嘔名曰瘧若但熱不寒者邪氣内藏於心外舎分肉之間令人消鑠脫肉温瘧者其脉如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯主之白虎加桂枝湯方知毋六两甘草二两炙石膏一斤粳米二合桂去皮三两右剉每五錢水一盞半煎至八分去滓温服汗出即愈瘧多寒者名曰牡瘧蜀􅃮散主之蜀􅃮散方蜀􅃮燒去腥雲毋烧二日夜龍骨等分右三味杵爲散未發前以漿水服半錢温瘧加蜀漆半分臨發時服一錢匙一方雲母作雲實附外䑓秘要方牡蠣湯治牡瘧牡蠣四两熬麻黄去節四两甘草二两蜀􅃮三两右四味以水八升先煮蜀漆麻黄去上沬得六升内諸藥煮取二升温服一升若吐則勿更服柴胡去半夏加括蔞湯治瘧病發渇者亦冶劳瘧柴胡八两人參黄芩甘草各三两括蔞根四两生姜二两大棗十二枚右七味以水一斗二升煮取六升去滓再煎取三升温服一升日二服柴胡桂蔞湯治瘧寒多㣲有熱或但寒不熱服一劑如神柴胡半斤桂枝三两去皮乾姜二两括蔞根四两黄芩三两牡蠣三两熬甘草二两炙右七味以水一斗二升煮取六升去滓再煎取三升温服一升日三服𥘉服㣲煩復服汗出便愈中風歷節病脉證幷治第五論一首脉證三條方十二首夫風之爲病當半身不遂或但臂不遂者此爲痺脉㣲而數中風使然寸口脉浮而緊緊則爲寒浮則爲虚寒虚相摶邪在皮膚浮者血虚絡脉空虚賊邪不㵼或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臓舌即難言口吐涎侯氏黒散治大風四肢煩重心中惡寒不足者外䑓治風癲菊花四十分白术十分細辛三分茯苓三分牡蠣三分桔梗八分防風十分人參三分礬石三分黄芩五分當歸三分乾姜三分芎藭三分桂枝三分右十四味杵爲散酒服方寸一日一服𥘉服二十日温酒調服禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力寸口脉遲而緩遲則爲寒緩則爲虚荣緩則爲亡血衛緩則爲中風邪氣中經則身痒而病丙穩禾疹心氣不足邪氣入中則胸滿而短氣風引湯除熱癱癎大黄乾姜龍骨各四两桂枝三两甘草牡蠣各二两寒水石滑石赤石脂白石脂紫石英石膏各六两右十二味杵麄篩以韋囊盛之取三指撮井花水三升煮三沸温服一升治大人風引少小驚癎瘈瘲日數十後醫所不療除熱方巢氏云脚氣冝風引湯防巳地黄湯治病如狂狀妄行獨語不休無寒熱其脉浮防已一錢桂枝三錢防風三錢甘草一錢右四味以酒一盃漬之一宿絞取汁生地黄二斤㕮咀蒸之如斗米飯乆以銅器盛其汁更絞地黄汁和分再服頭風摩散方大附子一枚炮塩等分右二味爲散沭了以方寸匕已摩疾上令藥力行寸口脉沉而弱沉即主骨弱即主筋沉即爲腎弱即爲肝汗出入水中如水傷心歷節黄汗出故曰歷節跌陽脉浮而滑滑則榖氣實浮則汗自出少隂脉浮而弱弱則血不足浮則爲風風血相摶即疼痛如掣盛人脉濇小短氣血汗出歷節疼不可屈伸此皆飮酒汗出當風所致諸肢節疼痛身體尫羸脚腫如脫頭眩短氣温温𣣔吐桂枝芍藥知母湯主之桂枝芍藥知母湯方桂枝四两芍藥三两甘草二两麻黄二两生姜五两白术五两知母四两防風四两附子二两炮右九味以水七升煮取二升温服七合日三服味酸則傷筋筋傷則緩名曰泄醎則傷骨骨傷則痿名曰枯枯泄相摶名曰斷泄荣氣不通衞不獨行荣衞俱㣲三焦無所御四属㫁絶身體羸痩獨足腫大黄汗出脛冷假令發熱便爲歷節也痛歷節不可屈伸疼痛烏頭湯主之烏頭湯方治脚氣疼痛不可屈伸麻黄芍藥黄氐各三两甘草川烏五枚㕮咀以蜜二升煎取一升即出烏豆右五味㕮咀四味以水三升煮取一升去滓内蜜煎中更煎之服七合不知盡服之礬石湯治脚氣冲心礬石二两右一味以漿水一斗五升煎三五沸浸脚良附方古今録驗續命湯治中風痱身體不能自收口不能言冐昧不知痛處或拘急不得轉側云與大續命同兼治婦人産後去血者及老人小兒麻黄桂枝當歸人參石膏乾姜甘草各三两芎藭杏仁四十枚右九味以水一斗煮取四升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風幷治但伏不得卧欬逆上氣面目浮腫千金三黄湯治中風手足拘急百節疼痛煩熱心亂惡寒經日不𣣔飲食麻黄五錢