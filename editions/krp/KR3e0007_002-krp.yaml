  text: 新編金匱要畧方論卷之中
  hash: sha256:1bbcd8986b705edb89490b8cecaaf809a000348f8d8b06d62363d8a67ac27df2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0007_SBCK_002-1a}
body:
  text: 尚書司封郎中充秘閣校理臣林億等詮次晉王叔和集漢張仲景述五臟風寒積聚病脉證幷治第十一論二首脉證十七條方二首肺中風者口燥而喘身運而重冐而腫脹肺中寒吐濁涕肺死臟浮之虚按之弱如葱葉下無根者死肝中風者頭目瞤两脇痛行常傴令人嗜甘肝中寒者两臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也脉經千金云時盗汗欬食巳吐其汁肝死臟浮之弱按之如索不来或曲如蛇行者死肝着其人當𣣔蹈其胸上先未苦時但𣣔飲熱旋復花湯主之臣億等校諸夲旋復花湯方皆同心中風者翕翕發熱不能起心中饑食即嘔吐心中寒者其人苦病心如噉蒜狀劇者心痛徹背背痛徹心譬如蠱注其脉浮者自吐乃愈心傷者其人劳倦即頭面赤而下重心中痛而自煩發熱當臍跳其脉弦此爲心臟傷所致也心死臟浮之實如麻豆按之益躁疾者死邪哭使魂魄不安者血氣少也血氣少者属於心心氣虚者其人則畏合目𣣔眠夣逺行而精神離散魂魄妄行隂氣衰者爲癲陽氣衰者爲狂脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣脾死臟浮之大堅按之如覆盃㓗㓗狀如揺者死臣億等計五藏各有中風中寒今脾只載中風腎中風中寒俱不載者以古文簡亂極多去右旣遠無文可以𥙷綴也趺陽脉浮而濇浮則胸氣强濇則小便數浮濇相摶大便則堅其脾爲約麻子仁丸主之麻子仁丸方麻子仁二升芍藥半斤枳實一斤大黃一斤厚朴一尺杏仁一升右六味末之煉蜜和丸梧子大飲服十丸日三以知爲度腎着之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病属下焦身劳汗出衣一作表裏冷濕乆乆得之腰以下冷痛腹重如帶五千錢乾姜苓术湯主之甘草乾姜茯苓白术湯方甘草白术各二两乾姜茯苓各四两右四味以水五升煮取三升分温三服腰中即温腎死臟浮之堅按之亂如轉丸益下入尺中者死問曰三噍竭部上噍竭善噫何謂也師曰上焦受中焦氣未和不能消榖故能噫耳下焦竭即遺溺失便其氣不和不能自禁制不湏治久則愈師曰熱在上焦者因欬為肺痿熱在中焦者則爲堅熱在下焦者則尿血亦令淋秘不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔問曰病者積有聚有㯏氣何謂也師曰積者藏病也終不移聚者府病也發作有時展轉痛移為可治㯏氣者脇下痛按之則愈復發為㯏氣諸積大法脉来細而附骨者乃積也寸口積在胸中㣲出寸口積在喉中関上積在臍傍上関上積在心下㣲下関積在小腹尺中積在氣衝脉出左積在左脉出右積在右脉两岀積在中央各以其部處之痰飲欬嗽病脉證幷治第十二論一首脉證二十一條方十九首問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以爲異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飮飲後水流在脇下欬唾引痛謂之懸飲飲水流行歸於四肢當汗岀而不汗出身體疼重謂之溢飲欬逆倚息短氣不得卧其形如腫謂之支飲水在心心下堅築短氣惡水不𣣔飲水在肺吐涎沫𣣔飲水水在脾少氣身重水在肝脇下支滿嚏而痛水在腎心下悸夫心下有留飲其人背寒冷如水大留飲者脇下痛引缺盃欬嗽則輒已一作轉甚胸中有留飲其人短氣而渴四肢歷節痛脉沉者有留飲膈上病痰滿喘欬吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸㣲者短氣脉䨇弦者寒也皆大下後虚脉偏弦者飮也肺飲不弦但苦喘短氣支飲亦喘而不能卧加短氣其脉平也病痰飲者當以温藥和之心下有痰飲胸脇支滿目眩用後方茯桂甘白湯方茯苓四两桂枝白术各三两甘草二两右四味以水六升煮取三升分温三服小便則利夫短氣有㣲飲當從小便去之苓桂术甘湯主之方見上腎氣丸亦主之方見胸氣中病者脉伏其人𣣔自利利反快雖利心下續堅滿此爲留飲𣣔去故也甘遂半夏湯主之甘遂半夏湯方甘遂大者三枚半夏十二枚以水一升煮取半升去滓芍藥五枚甘草如指大一枚炙一本作無右四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之脉浮而細滑傷飲脉弦數有寒飲冬夏難治脉沉而弦者懸飲内痛病懸飲者十棗湯主之十棗湯方芫花熬甘遂大㦸各等分右三味搗篩以水一升五合先煮肥大棗十枚取九合去滓内藥末强人服一錢匕羸人服半錢平旦服不下者明日更加半錢得快下後糜粥自養病溢飲者當發其汗大青龍湯主之小青龍湯亦主之大青龍湯方麻黄六两去節桂枝二两去皮甘草二两炙杏仁四十箇去皮尖生姜三两大棗十二枚石膏如鷄子大研右七味以水九升先煮麻黄减二升去上沫内諸藥煮取三升去滓温服一升取㣲似汗汗多者温粉粉之小青龍湯方麻黃去節三两芍藥三两五味子半斤乾姜三两甘草三两炙細辛三两桂枝三两去皮半夏半升湯洗右八味以水一斗先煮麻黄减二升去上沫内諸藥煮取三升去滓温服一升膈間支飲其人喘滿心下痞堅面色墨黒其脉沉緊得之數十日醫吐下之不愈术防己湯主之虚者即愈實者三日復發復愈不愈者冝术防巳湯去石膏加茯苓芒硝湯主之术防巳湯方术防巳三两石膏十二枚鷄子大桂枝二两人參四两右四味以水六升煮取二升分温再服术防巳加茯苓芒硝湯方术防巳桂枝各二两人參芒硝三合茯苓各四两右五味以水六升煮取二升去滓内芒硝再㣲前分温再服㣲利則愈心下有支飲其人若冐眩澤瀉湯主之澤瀉湯方澤瀉五两白术二两右二味以水二升煮取一升分温再服支飲胸滿者厚朴大黄湯主之厚朴大黄湯方厚朴一尺大黄六两枳實四两右三味以水五升煮取二升分温再服支飲不得息葶藶大棗㵼肺湯主之方見肺癰中嘔家本渴渴者爲𣣔解今反不渴心下有支飲故也小半夏湯主之千金云小半夏湯加茯苓小半夏湯方半夏一升生姜半斤右二味以水七升煮取一升半分温再服腹滿口舌乾燥此腸間有水氣巳椒藶黄丸主之防椒葶黄丸方防巳椒目葶藶熬大黃各一两右四味末之蜜丸如梧子大先食飲服一丸日三服稍増口中有津液渴者加芒硝半两卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之小半夏加茯苓湯方半夏一升生姜半斤茯苓三两一法四两右三味水七升煮取一升五合分温再服假令痩人臍下有悸吐涎沬而此水也五苓散主之五苓散方澤瀉一两一分猪苓三分去皮茯苓三分白术三分桂二分去皮右五味爲末白飲服方寸匕日三服多飲暖水汗出愈附方外䑓茯苓飮治心胸中有停痰宿水自吐出水後心胸間虚氣滿不能食消痰氣令能食茯苓人參白术各三两枳實二两橘皮二两半生姜四两右六味水六升煮取一升八合分温三服如人行八九里進之欬家其脉弦爲有水十棗湯主之方見上夫有支飲家欬煩胸中痛者不卒死至一百日一歳冝十棗湯方見上人欬數歳其脉弱者可治實大數者死其脉虚者必若冐其人本有支飲在胸中故也治屬飲家欬逆倚息不得卧小青龍湯主之方見上文肺癰中青龍湯下巳多唾口燥寸脉沉尺脉㣲手足厥逆氣從小腹上衝胸咽手足痺其面翕然熱如醉狀因復下流隂股小便難時復冐者與茯苓桂枝五味甘草湯治其氣衝桂苓五味甘草湯方茯苓四两桂枝四两去皮甘草炙三两五味子半升右四味以水八升煮取三升去滓分三温服衝氣即低而反更欬胸滿者用桂苓五味甘草湯去桂加生姜細辛以治其欬滿苓甘五味姜辛湯方茯苓四两甘草乾姜細辛各三两五味半升右五味以水八升煮取三升去滓温服半升日三服欬滿即止而更復渴衝氣復發者以細辛乾姜爲熱藥也服之當遂滿而渴反止者為支飲也支飲者法當冐冐者必嘔嘔者復内半夏以去其水桂苓味甘去桂四姜辛夏湯方茯苓四两甘草細辛乾姜各二两五味半夏各半升右六味以水八升煮取三升去滓温服半升日三服水去嘔止其人形腫者加杏仁主之其證應内麻黄以其人遂痺故不内之若逆而内之者必厥所以然者以其人血虚麻黃發其陽故也苓芍姜味辛夏仁湯茯苓四两甘草三两五味半升乾姜三两細辛三两半夏半升杏仁半升去皮尖右七味以水一斗煮取三升去滓温服半升日三服若面熱如醉此爲冐熱上衝熏其面加大黄以利之茯甘姜味辛夏仁黄湯茯苓四两甘草三两五味半升乾姜三两細辛三两半夏半升杏仁半升大黃三两右八味以水一斗煮取三升去滓温服半升日三服先渴後嘔爲水停心下此属飲家小半夏茯苓湯主之方見上消渴小便利淋病脉證并治第十三脉證九條方六首厥隂之爲病消渴氣上衝心心中疼熱熱而不欲食食即吐下之不肯止寸口脉浮而運浮即爲虚運即爲勞虚則衞氣不足勞則榮氣竭跌陽脉浮而數浮即爲氣數即消榖而大堅乙作緊氣盛則溲數數數即堅堅數相摶即為消渇男子消渇小便反多以飲一斗小便一斗腎氣丸主之方見脚氣中脉浮小便不利㣲熱消渇者宜利小便發汗五苓散主之渴𣣔飲水水入則吐者名曰水逆五苓散主之渴𣣔飲水不止者文蛤散主之文蛤散方文蛤四两右一味杵爲散以沸湯五合和服方寸匕淋之爲病小便如粟狀小腹弦急痛引臍中趺陽脉數胃中有熱即滿榖引食大便必堅小便即數淋家不可發汗發汗則必便血小便不利者有水氣其人若渴用後丸主之括蔞瞿麥丸括蔞根二两茯苓薯蕷各三两附子一枚炮瞿麥一两右五味末之煉蜜丸梧子大飲服三丸日三服不知増至七八丸以小便利腹中温為知小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之蒲灰散方蒲灰七分滑石二分右二味杵爲散飲服方寸匕日三服滑石白魚散滑石二分亂髮二分燒白魚二分右三味杵為散飲服半錢匙日三服茯苓戎鹽湯方茯苓半斤白术二两戎鹽弹丸大一枚右三味渴𣣔飲水口乾若燥者白虎加人參湯主之方見中􅠽中脉浮發熱渴𣣔飲水小便不利者猪苓湯主之猪苓湯方猪苓去皮茯苓阿膠滑石澤瀉各一两右五味以水四升先煮四味取二升去滓内膠洋消温服七合日三服水氣病脉證幷治第十四論七首脉證五條方十首師曰病有風水有皮水有正水有石水有黃汗風水其脉自浮外證骨節疼痛惡風皮水其脉亦浮外證腑腫按之没指不惡風其腹如皷不渴當發其汗正水其脉沉遲外證自喘石水其脉自沉外證腹滿不喘黃汗其脉沉遲身發熱胸滿四肢頭面腫攵不愈必致癰膿脉浮而洪浮則爲風洪則為氣風氣相摶風强則為隱疹身體為痒痒為泄風久為痂癩氣强則為水難以俛仰風氣相擊身體洪腫汗出則愈惡風則虚此為風水不惡風者小便通利上焦有寒其口多涎此為黄汗寸口脉沉滑者中有水氣面目腫大有熱名曰風水視人之目褁上㣲擁如蚕新卧起状其頸脉動時時欬按其手足上䧟而不起者風水太陽病脉浮而緊法當骨節疼痛及不疼身體反重而酸其人不渴汗出即愈此爲風水惡寒者此爲極虚發汗得之渴而不惡寒者此爲皮水身腫而冷状如周痺胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節欬而喘不渴者此為脾脹其状如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗裏水者一身面目黃腫其脉沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加术湯主之方見下趺陽脉當伏今反緊本自有寒疝瘕腹中痛醫反下之下之即胸滿短氣趺陽脉當伏今反數本自有熱消糓小便數今反不利此𣣔作水寸口脉浮而遲浮脉則熱遲脉則潜熱潜相摶名曰沈趺陽脉浮而數浮脉即熱數脉即止熱止相摶名曰伏沈伏相摶名曰水沈則絡脉虚伏則小便難虚難相摶水走皮膚即爲水矣寸口脉弦而緊弦則衛氣不行即惡寒水不沾流走於腸間少隂脉緊而沉緊則爲痛沉則為水小便即難脉得諸沉當責有水身體腫重水病脉出者死夫水病人目下有卧蚕面目鮮澤脉伏其人消渴病水腹水小便不利其脉沉絶者有水可下之問曰病下利後渴飲小便不利腹滿因腫者何也荅曰此法當病水若小便自利及汗出者自當愈心水者其身重而少氣不得卧煩而燥其人隂腫肝水者其腹大不能自轉則脇下腹痛時時津液㣲生小便續通脉水者其身腫小便難時下鴨溏脾水者其腹大四肢苦重津液不生但若少氣小便難腎水者其腹大臍腫腰痛不得溺隂下濕如牛鼻上汗其足逆冷面反瘦師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈師曰寸口脉沉而遲沉則為水遲則為寒寒水相摶趺陽脉伏水榖不化脾氣衰則䳱溏胃氣衰則身腫少陽脉卑少隂脉細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分問曰病者苦水面目身體四肢皆腫小便不利脉之不言水反言胸中痛氣上衝咽状如炙肉當㣲欬喘審如師言其脉何類師曰寸口脉沉而緊沉為水緊為寒沉緊相摶結在關元始時當㣲年盛不覺陽衰之後荣衛相干陽損隂盛結寒㣲動腎氣上衝喉咽塞噎脇下急痛醫以為留飲而大下之氣撃不去其病不除後重吐之胃家虚煩咽燥𣣔飲水小便不利水糓不化面目手足浮腫又與葶藶丸下水當時如小差食飲過度腫復如前胸脇苦痛象苦奔㹠其水揚溢則浮咳喘逆當先攻撃衞氣令止乃治欬欬止其喘自差先治新病病當在後風水脉浮身重汗出惡風者防已黃耆湯主之腹痛加芍藥防已黄耆湯方防巳一两黄耆一两一分白术三分甘草半两炙右剉每服五錢匕生姜四片棗一枚水盞半煎取八分去滓温服良乆再服風水急風一身悉腫脉浮不渴續自汗出無大熱越婢湯主之越婢湯方麻黄六两石膏半斤生姜三两大棗十五枚甘草二两右五味以水六升先煮麻黄去上沫内諸藥煮取三升分温三服惡風者加附子一枚炮風水加术四兩古今錄驗皮水為病四肢腫水氣在皮膚中四肢聶聶動者防已茯苓湯主之防巳茯苓湯防已三两黄耆三两桂枝三两茯苓六两甘草二两右五味以水六升煮取二升分温三服裏水越婢加术湯主之甘草麻黄湯亦主之越婢加术湯見上於内加白术四两又見脚氣中甘草麻黄湯甘草二两麻黄四两右二味以水五升先煮麻黄去上沫内甘草煮取三升温服一升重覆汗出不汗再服慎風寒水之為病其脉沈小属小隂浮者為風無水虚脹者為氣水其汗即已脉沈者冝麻黄附子湯浮者冝杏子湯麻黄附子湯方麻黄三两甘草二两附子一枚炮右三味以水七升先煮麻黄去上沫内諸藥煮取二升半温服八分日三服杏子湯未見恐是麻黄杏仁甘草石膏湯厥而皮水者蒲灰散主之方見上問曰黃汗之為病身體腫一作重發熱汗出而渇状如風水汗沾衣色正黃如藥汁脉自沉何從得之師曰以汗出入水中浴水從汗孔入得之冝耆芍桂酒湯主之黄耆桂苦酒湯黄耆五两芍藥三两桂枝三两右三味以苦酒一升水七升相和煮取三升温服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也一方用羙酒醃代苦酒黄汗之病两脛自冷假令發熱此属歷節食已汗出又身常暮盗汗出者此劳氣也若汗出巳反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出巳輙輕者久乆必身瞤即胸中痛又從腰以上必汗出不無汗腰髖弛痛如有物在皮中状劇者不能食身疼重煩燥小便不利為黃汗桂枝加黄耆湯主之桂枝加黄耆湯方桂枝芍藥各三两甘草二两生姜三两大棗十二枚黄耆二两右六味以水八升煑取三升温服一升湏臾飲熱稀粥一升餘以助藥力温服取㣲汗若不汗更服師曰寸口脉遲而濇遲則爲寒濇爲血不足趺陽脉㣲而遲㣲則爲氣遲則爲寒寒氣不足則手足逆冷手足逆冷則荣衞不利荣衞不利則腹滿脇鳴相逐氣轉膀胱荣衞俱劳陽不通即身冷氣不通即骨痛陽前通則惡寒隂前通則痺不仁隂陽相得其氣乃行大氣一轉其氣乃散實則失氣虚則遺尿名曰氣分氣分心下堅大如盤邉如旋杯水飲用後方主之桂姜草棗黃辛附湯方桂枝生姜三两甘草二两大棗十二枚麻黄細辛各二两附子一枚炮右七味以水七升煮麻黃去上沬内諸藥煮取二升分温三服當汗出如䖝行皮中即愈心下堅大如盤邉如旋盤水飲所作枳术湯主之枳术湯方枳實七枚白术二两右二味以水五升煮取三升分温三服腹中耎即當附方外䑓防巳黃耆湯治風水脉浮為在表其人或頭汗岀表無他病病者但下重從腰以上為和腰以下當腫及隂難以屈伸方見氣濕中黃疸病脉證幷治第十五論二首脉證十四條方七首寸口脉浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行趺陽脉堅而數數則為熱熱則消榖緊則為寒食即為滿尺脉浮爲傷腎趺陽脉緊為傷脾風寒相摶食榖即昡榖氣不消胃中苦渴渴氣下流不便不通隂𬒳其寒熱流膀胱身體盡黄名曰糓疸額上黒㣲汗岀手足中熱薄暮即發膀胱急小便自利名曰女劳疸腹如水状不治心中懊憹而熱不能食時𣣔吐名曰酒疸陽明病脉遲者食難用炮炮則發煩頭痃小便必難此𣣔作榖疸雖下之腹滿如故所以然者脉遲故也夫病酒黃疸必小便不利其候心中熱足下熱是其證也酒黄疸者或無熱請言了腹滿𣣔吐鼻燥其脉浮者先吐之沉弦者先下之酒疸心中熱𣣔嘔者吐之愈酒疸下之乆乆爲黒疸目青面黒心中如噉蒜韲状大便正黒皮膚瓜之不仁其脉浮弱雖黒㣲黄故知之師曰病黄疸發熱煩喘胸滿口燥有以病發時火劫其汗两熱所得然黄家所得從濕得之一身盡發熱面黄肚熱熱在裏當下之脙沉渴𣣔飲水小便不利者皆發黃腹滿舌痿黄燥不得睡属黄家右痿疑作心痿黃疸之病當以十八日為期治之十日以上瘥反極為難治疸而渴者其疸難治疸而不渴者其疸可治發於隂部其人必嘔陽部其人振寒而發熱也榖疸之為病寒熱不食食即頭眩心胸不安攵久發黃為榖疸􅌲陳湯主之􅌲陳湯方􅌲陳蒿六两梔子十四枚大黃二两右三味以水一斗先煮茵陳減六升内三味煮取三升去滓分温三服小便當利尿如皂角汁状色正赤一宿腹減黃從小便去也黃家日晡時發熱面反惡寒此為女劳得之腣胱急少腹滿身盡黄額上黒足下熱因作黒疸其腹脹如水状大便必黒時溏此女劳之病非水也腹滿者難治用後方消礬散方消石礬石燒等分右二味為末以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黒是候也酒黄疸心中懊憹或熱痛梔子大黃湯主之梔子大黃湯方梔子十四枚大黃二两枳實五枚豉一升右四味以水六升煮取二升分温三服諸病黄家但利其小便假令脉浮當以汗解之冝桂枝加黃耆湯主之方見水病中諸黄用後方猪膏髪煎猪膏半斤亂髪如鷄子大三枚右二味和膏中煎之髪消藥成分再服病從小便出黄疸病茵陳五苓散主之一本云茵陳湯及五苓散並主之茵陳五苓散茵陳稿末十分五苓散五分方見痰飲中右二物和先食飲方寸匕日三服黃疸腹滿小便不利而赤自汗出此爲表和裏實當下之冝大黄滑石湯大黄滑石湯大黄黃檗滑石各四两梔子十五枚右四味以水六升煑取二升去滓内滑石更煮取一升頓服黄疸病小便色不變𣣔自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之方見消􅠽中諸劳腹痛而嘔者冝柴胡湯必小柴胡湯方見嘔吐中男子黄小便自利當與虚劳小建中湯方見虚劳中附方苽蒂湯治諸黃方見暍病中千金麻黃醇酒湯治黄疸麻黃三两右一味以羙清酒五升煮取二升半頓服盡冬月用酒春月用水煮之驚悸吐衂下血胸滿瘀血病脉證治第十六脉證十二條方五首寸口脉動而弱動即為驚弱則為悸師曰夫脉浮目睛暈黃衂未止暈黃去目睛急了知衂今止又曰從春至夏衂者太陽從秋至冬衂者陽明衂家不可汗汗岀必額上䧟脉緊急直視不能眴不得眠病人面無色無寒熱脉沉弦者衂浮弱手按之絶者下血煩欬者必吐血夫吐血欬逆上氣其脉數而有熱不得卧者死夫酒客欬者必致吐血此因極飲過度所致也寸口脉弦而大弦則為减大則為芤减則為寒芤則為虚寒虚相擊此名曰革婦人則半産漏下男子則亡血亡血不可發其表汗出則寒慄而振病人胸滿唇痿舌青口燥但𣣔嗽水不𣣔嚥無寒熱脉㣲大来遲腹不滿其人言我滿為有瘀血病者如熱状煩滿口乾燥而渴其脉反無熱此為隂状是瘀血也當下之火邪者桂枝去芍藥加蜀􅃮牡蠣龍骨捄逆湯主之桂枝捄逆湯方桂枝二两去皮甘草三两炙生姜六两牡蠣五两熬龍骨四两大棗十二枚蜀􅃮三两洗去腥右為末以水一斗二升先煮蜀􅃮減二升内諸藥後取三升去滓温服一升心下悸者半夏麻黄丸主之半夏麻黄丸方半夏麻黄等分右二味末之煉蜜和丸小豆大飲服三丸日三吐血不止者後湯主之栢葉湯栢葉乾姜各三两艾三把右三味以水五升取馬通汁一升合煮取一升分温再服下血先便後血此遠血也黃土湯主之黄土湯方亦主吐血衂血甘草乾地黄白术附子炮阿膠黄苓各三两竈中黄土半斤右七味以水八升煮取三升分温二服下血先血後便此近血也赤小豆當歸散主之方見孤惑中心氣不足吐血衂血用後方瀉心湯亦治霍亂大黄二两黄連黄芩各一两右三味以水三升煮取一升頓服之嘔吐噦下利病脉證治第十七論一首脉證二十七條方二十三首夫嘔家有癰膿不可治嘔膿盡自愈先嘔却渴者此為𣣔解先渴却嘔者為水停心下此属飲家嘔家本渴今反不渴者以心下有支飲故也此属支飲問曰病人脉數數為熱當消數引食而反吐者何也師曰以發其汗令陽㣲膈氣虚脉乃數數為客熱不能消榖胃中虚冷故也脉弦者虚也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之令脉反弦故名曰虚寸口脉㣲而數㣲則無氣無氣則荣虚荣虚則血不足血不足則胸中冷趺陽脉浮而濇浮則為虚虚則傷脾脾傷則不磨朝食暮吐暮食朝吐宿榖不化名曰胃反脉緊而濇其病難治病人𣣔吐者不可下之噦而腹滿視其前後知何部不利利之即愈嘔而胸滿者用後方茱茰湯吳茱茰一升人參三两生姜六两大棗十二枚右四味以水五升煮取三升温服七合日三服乾嘔吐涎沬頭痛者茱茰湯主之方見上嘔而腸鳴心下痞者用後方半夏瀉心湯半夏半升洗黃芩乾姜人參各三两黄連一两大棗十二枚甘草三两炙右七味以水一斗煮取六升去滓再煮取三升温服一升日三乾嘔而利者用後方黄芩加半夏生姜湯方黃芩三两甘草二两炙芍藥三两半夏半斤生姜四两大棗二十枚右六味以水一斗煮取三升去滓温服一升日再夜一服諸嘔吐糓不得下者小半夏湯主之方見痰飲中嘔吐而病在膈上後思水者解急與之思水者用後方猪苓散猪苓茯苓白术各等分右三味杵為散飲服方寸匕日三嘔而脉弱小便復利身有㣲熱見厥者難治用後方四逆湯附子七箇生用乾姜一两半甘草二两炙右三味以水三升煮取一升二合去滓分温再服强人可大附子一枚乾姜三两嘔而發熱者用後方小柴胡湯方柴胡半斤黃芩三两人參三两甘草二两半夏半斤生姜三两大棗十二枚右七味以水一斗二升煮取六升去滓再煎取三升温服一升日三胃反嘔吐者大半夏湯主之千金云治胃反不受食食入即多吐外䑓云治嘔心下痞鞭者大半夏湯方半夏二升洗完用人參三两白蜜一升右三味以水一斗二升和蜜揚之二百四十遍煮取二升半温服一升餘分再服食巳即吐者用後方外䑓治吐水大黃甘草湯方大黃四两甘草一两右二味以水三升煮取一升分温再服胃反吐而渴𣣔飲水者用後方茯苓澤瀉湯外䑓治消渴脉絶胃反吐食之有小麥一升茯苓半斤澤瀉四两甘草二两桂枝二两白术三两生姜四两右六味以水一斗煮取三升内澤瀉再煮取二升半温服八合日三吐後渴飲得水而貪飲者文蛤湯主之兼主㣲風脉者頭痛文蛤湯文蛤五两麻黄甘草生姜各三两石膏五两杏仁五十箇大棗十二枚右七味以水六升煮取二升温服一升汗出即愈乾嘔吐逆吐涎沫用後方半夏乾姜散半夏乾姜等分右二味杵為散取方寸匕漿水一升半煎取七合頓服之病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憤憤然無奈用後方生姜半夏湯半夏半斤生姜汁一升右二味以水三升煮半夏取二升内生姜汁煮取一升半小冷分四服日三夜一服止停後服乾嘔噦若手足厥者橘皮湯主之橘皮湯橘皮四两生姜半斤右二味以水七升煮取三升温服一升下咽即愈噦逆者橘皮竹茹湯主之橘皮竹茹湯橘皮二升竹茹二升大棗三十枚生姜半斤甘草五两人參一两右六味以水一斗煮取三升温服一升日三服夫六府氣絶於外者手足寒上氣脚縮五臟氣絶於内者利不禁下甚者手足不仁下利脉沉弦者下重脉大者爲未止脉㣲弱數者爲𣣔自止雖發熱不死下利手足厥冷無脉者炙之不濕若脉不還反㣲喘者死少隂負趺陽者爲順也下利有㣲熱而渴脉弱者今自愈下利脉數有㣲熱汗出今自愈設脉緊爲未解下利脉數而渴者今自愈設不差必清膿血以有熱故也下利脉反弦發熱身汗者自愈下利氣者當利其小便下利寸脉反浮數尺中自濇者必清膿血下利清榖不可攻其表汗出必脹滿下利脉沉而遲其人面少赤身有㣲執下利清榖者必欝胃汗岀而解病人必㣲熱所以然者其面戴陽下虚故也下利後脉絶手足厥冷晬時脉還手足温者生脉不還者死下利腹脹滿身體疼痛者先温其裏乃攻其表温裏冝四逆湯攻表冝桂枝湯四逆湯方見上桂枝湯桂枝三两去皮芍藥三两甘草三两炙生姜三两大棗十二枚右五味㕮咀以水七升㣲火煮取三升去滓適寒温服一升服已湏臾啜稀粥一升巳助藥力温覆令一時許遍身熱熱㣲似有汗者益佳不可令如水淋漓若一服汗岀病差停後服下利三部脉皆平按之心下堅者急下之冝大承湯下利脉遲而滑者實也利未𣣔止急下之冝大承氣湯下利脉反滑者當有所去下乃愈冝大承氣湯下利巳差至其年月日時復發者以病不盡故也當下之冝大承氣湯大承氣湯見痓病中下利譫語者有燥屎也小承氣湯主之小承氣湯大黃四两厚朴二两炙枳實大者三枚炙右三味以水四升煮取一升二合去滓分温二服得利則止下利便膿血者桃花湯主之桃花湯赤石脂一升一半剉一半篩末乾姜一两粳米一升右三味以水七升煮米令熟去滓温七合内赤石脂末方寸匕日三服若一服愈餘勿服熱利重下者白頭翁湯主之白頭翁湯白頭翁二两黃連黃栢秦皮各三两右四味以水七升煮取二升去滓温服一升不愈更服下利後更煩桉之心下濡者爲虚煩也梔子豉湯主之梔子豉湯梔子十四枚香豉四合右二味以水四升先煮梔子得二升半内豉煮取一升半去滓分二服温進一服得吐則止下利清榖裏寒外熱汗岀而厥者通脉四逆湯主之通脉四逆湯方附子大者一枚生用乾姜三两强者四两甘草二两炙右三味以水三升煮取一升一合去滓分温再服下利肺痛紫參湯主之紫參湯方紫參半斤甘草三两右二味以水五升先煮紫參取二升内甘草煮取一升半分温三服疑非仲景方氣利訶梨勒散主之訶梨勒散方訶梨勒十枚右一味為散粥飲和頓服疑非仲景方附方千金翼小承氣湯治大便不通噦數譫語方見上外䑓黄芩湯治乾嘔下利黄芩人參乾姜各三两桂枝一两大棗十二枚半夏半升右六味以水七升煮取三升温分三服瘡癰腸癰浸淫病脉證幷治第十八論一首脉證三條方五首諸浮數脉應當發熱而反洒淅惡寒若有痛處當發其癰師曰諸癰腫𣣔知有膿無膿以手掩腫上熱者為有膿不熱者為無膿腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積飛身而熱脉數此為膿内有癰膿薏苡附子敗醤散主之薏苡附子敗醬散方薏苡仁十分附子二分敗醤五分右三味杵為末取方寸匕以水二升煎减半頓服小便當下腸癰者小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脉遲緊者膿未成可下之當有血脉洪數者膿巳成不可下也大黃牡丹湯主之大黄牡丹湯方大黃四两牡丹一两桃仁五十箇瓜子半升芒消三合右五味以水六升煮取一升去滓内芒消丹煎沸頓服之有膿當下如先膿當下血問曰寸口脉浮㣲而澁然當亡血若汗出設不汗者云何荅曰若身有瘡𬒳刀斧所傷亡血故也病金瘡王不留行散主之王不留行散王不留行十分八月採蒴藋細葉十分七月七日採桑東南根自皮十分三月三日採甘草十八分川椒三分除日及閉口者汁黃芩二分乾姜二分芍藥二分厚朴二分右九味桑根皮以上三味燒灰存性勿令灰過各别杵篩合治之爲散服方寸匕小瘡即粉之大瘡但服之産後亦可服如風寒桑東根勿取之前三物皆隂乾百日排膿散方枳實十六枚芍藥六分桔梗一分右三味杵爲散取鷄子黄一枚以藥散與鷄黄相等揉和煎如薄粥温服一升差即止蚘厥者當吐蚘令病者静而復時煩此爲藏寒蚘上入膈故煩湏臾復止得食而嘔又煩者蚘聞食臭出其人當自吐蚘蚘厥者烏梅丸主之烏梅丸方烏梅三百箇細辛六两乾姜十两黃連一斤當歸四两附子六两炮川椒四两去汁桂枝六两人參黃蘗各六两右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟擣成泥和藥令相得内臼中與蜜杵五千下丸如梧子大先食飲服十丸三服稍加至二十丸禁生冷潰臭等食新編金匱要畧方論卷之中
