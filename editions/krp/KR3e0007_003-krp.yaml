front:
  text: 新編金匱要畧方論卷之下
  hash: sha256:91dd22c06a1f39c7cda0b0f9b49e8253640688f381a53c8cdeb4da17684a87af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0007_SBCK_003-1a}
body:
  text: 尚書司封郎中充秘閣校理臣林億等詮次晉王叔和集漢張仲景述婦人姙娠病脉證幷治第二十脉證三條方八首師曰婦人得平脉隂脉小弱其人渴不能食無寒熱名姙娠桂枝湯主之方見利中於法六十日當有此證設有醫治逆者却一月加吐下者則絶之婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者爲癥痼害姙娠六月動者前三月經水利時胎下血者後斷三月衃也所以血不止者其癥不去故也當下其癥桂枝茯苓丸主之桂枝茯苓丸方桂枝茯苓牡丹去心桃仁去皮尖熬芍藥各等分右五味末之煉蜜和丸如兎屎大每日食前服一丸不知加至三丸婦人懐娠六七月脉弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子藏𨳩故也當以附子湯温其藏方未見師曰婦人有漏下者有半産後因續下血都不絶者有姙娠下血者假令姙娠腹中痛為胞阻膠艾湯主之芎歸膠艾湯方一方加乾姜一两胡氏治婦人胞動無乾姜芎窮阿膠甘草各二两艾葉當歸各三两芍藥四两乾地黃右七味以水五升清酒五升合煮取三升去滓内膠令消盡温服一升日三服不差更作婦人懐娠腹中㽲痛當歸芍藥散主之當歸芍藥散方當歸三两芍藥一斤茯苓四两白术四两澤瀉半斤芎藭半斤一作三两右六味杵為散取方寸匕酒和日三服姙娠嘔吐不止乾姜人參半夏丸主之乾姜人參半夏丸方乾姜人參各一两半夏二两右三味末之以生姜汁糊為丸如梧子大飲服十丸日三服姙娠小便難飲食如故歸母苦參丸主之當歸貝母苦參丸方男子加滑石半两當歸貝母苦參各四两右三味末之煉蜜丸如小豆大飲服三丸加至十丸姙娠有水氣身重小便不利洒淅惡寒起即頭眩葵子茯苓散主之葵子茯苓散方葵子茯苓三两右二味杵為散飲服方寸匕日三服小便利則愈婦人姙娠冝常服當歸散主之當歸散方當歸黄苓芍藥芎窮各一两白术半斤右五味杵為散酒飲服方寸匕日再服姙娠常服即易産胎無苦疾産後百病悉主之姙娠養胎白术散主之白术散方見外䑓白术芎窮蜀椒三分汁牡蠣右四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一两半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之後不解者小麥汁服之巳後渴者大麥粥服之病雖愈服之勿置婦人傷胎懐身腹滿不得小便從腰以下重如有水氣状懐身七月太隂當養不養以心氣實當刺瀉劳宫及関元小便㣲利則愈見玉㞼婦人産後病脉證治第二十一論一首脉證六條方七首問曰新産婦人有三病一者病痓二者病欝冐三者大便難何謂也師曰新産血虚多汗出喜中風故令病痓亡血復汗寒多故令欝冐亡津液胃燥故大便難産婦欝冐其脉㣲弱不能食大便反堅但頭汗出所以然者血虚而厥厥而必冐冐家𣣔解必大汗出以血虚下厥孤陽上岀故頭汗出所以産婦喜汗岀者亡隂血虚陽氣獨盛故當汗出隂陽乃復大便堅嘔不能食小柴胡湯主之方見嘔吐中病解能食七八日更發熱者此為胃實大承氣湯主之方見産中産後腹中疼痛當歸生姜羊肉湯主之幷治腹中寒疝虚劳不足當歸生姜羊肉湯方見寒病中産後腹痛煩滿不得卧枳實芍藥散主之枳實芍藥散方枳實燒令黒勿太過芍藥等分右二味杵為散方寸匕日三服幷主癰膿以麥粥下之師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血着臍下冝下瘀血湯主之亦主經水不利下瘀血湯方大黄二两桃仁二十枚䗪虫二十枚熬去足右三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝産後七八日無太陽證少腹堅痛此惡露不盡大便煩躁發熱切脉㣲實再倍發熱日晡時煩躁者不食食則讝語至夜即愈冝大承氣湯主之熱在裏結在腣胱也方見痓病中産後風續之數十日不解頭㣲痛惡寒時時有熱心下悶乾嘔汗出雖又陽旦證續在耳可與陽旦湯即桂枝湯方見下利中産後中風發熱面正赤喘而頭痛竹葉湯主之竹葉湯方竹葉一把葛根三两防風一两桔梗桂枝人參甘草各一两附子一枚炮大棗十五枚生姜五两右十味以水一斗煮取二升半分温三服温覆使汗出頸項强用大附子一枚破之如豆大前藥揚去沫嘔者加半夏半升洗婦人乳中虚煩亂嘔逆安中益氣竹皮大丸主之竹皮大丸方生竹茹二分石膏二分桂枝一分甘草七分白薇一分右五味末之棗肉爲丸弹子大以飲服一丸日三夜二服有熱者倍白薇煩喘者加栢實一分産後下利虚極白頭翁加甘草阿膠湯主之白頭翁加甘草阿膠湯方白頭翁甘草阿膠各二两秦皮黄連蘗皮各三两右六味以水七升煮取二升半内膠令消盡分温三服附方千金三物黄芩湯治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黃芩一两苦參二两乾地黄四两右三味以水八升煮取二升温服一升多吐下䖝千金内補當歸建中湯治婦人産後虚羸不足腹中刺痛不止吸吸少氣或苦少腹中急摩痛引腰皆不能食飲産後一月日得服四五劑為善令人强壮冝當歸四两桂枝三两芍藥六两生姜三两甘草二两大棗十二枚右六味以水一斗煮取三升分温三服一日令盡若大虚加飴糖六两湯成内之於火上煖令飴消若去血過多崩内衂不止加地黃六两阿膠二两合八味湯成内阿膠若無當歸以芎藭代之若無生姜以乾姜代之婦人雜病脉證幷治第二十二論一首脉證合十四條方十三首婦人中風七八日續来寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧状發作有時小柴胡湯主之方見嘔吐中婦人傷寒發熱經水適来晝日明了暮則讝語如見鬼状然此爲熱入血室治之無犯胃氣及上二焦必自愈婦人中風發熱惡寒經水適来得七八日熱除脉遲身凉和胸脇滿如結胸状讝語者此為熱入血室也當刺期門随其假而取之陽明病下血讝語者此為熱入血室但頭汗出當刺期門隨其實而㵼之濈然汗出者愈婦人咽中如有炙臠半夏厚朴湯主之半夏厚朴湯方千金作胸滿心下堅咽中帖帖如有炙肉吐之不出吞之不下半夏厚朴三两茯苓四两生姜五两乾蘇葉二两右五味以水七升煮取四升分温四服日三夜一服婦人藏躁喜悲傷𣣔哭象如神靈所作數欠伸甘麥大棗湯主之甘草小麥大棗湯方甘草二两小麥一升大棗十枚右三味以水六升煮取三升温分三服亦補脾氣婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之小青龍湯方見肺癰中瀉心湯方見驚悸中婦人之病因虚積冷結氣為諸經水斷絶至有歷年血寒積結胞門寒傷經絡疑堅在上嘔吐涎唾乆成肺癰形體損分在中盤結繞臍寒疝或两脇疼痛與藏相連或結熱中病在関元脉數無瘡肌若魚鱗時着男子非止女身在下未多經候不匀令隂掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冐状如厥㒹或有憂慘悲傷多嗔此皆帶下非有鬼神乆則羸瘦脉虚多寒三十六病千變萬端審脉隂陽虚實緊弦行其針藥治危得安其雖同病脉各異源子當辯記勿謂不然問曰婦人年五十所病下利數十日不止暮即發熱少腹裏急腹滿手掌煩熱唇口乾燥何也師曰此病属帶下何以故曽經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以温經湯主之温經湯方吴茱茰三两當歸芎藭芍藥各二两人參桂枝阿膠牡丹皮生姜甘草各二两半夏半升麥門冬一升去心右十二味以水一斗煮取三升分温三服亦主婦人少腹寒乆不受胎兼取崩中去血或月水来過多及至期不来帶下經水不利少腹满痛經一月再見者土瓜根散主之土瓜根散方隂㿗腫亦主之土瓜根芍藥桂枝䗪虫各三分右四味杵為散酒服方寸匕日三服寸口脉弦而大弦則為減大則為芤減則為寒芤則為虚寒虚相摶此名曰革婦人則半産漏下旋覆花湯主之旋覆花湯方旋覆花三两葱十四莖新絳少許右三味以水三升煮取一升頓服之婦人陷經漏下黒不解膠姜湯主之臣億等校諸本無膠姜湯方想是姙娠中膠艾湯婦人少腹滿如敦状小便㣲難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之大黄甘遂湯方大黄四两甘遂二两阿膠二两右三味以水三升煮取一升頓服之其血當下婦人經水不利下抵党湯主之亦治男子膀胱滿急有瘀血者抵党湯方水蛭三十箇熬蝱虫三十枚熬去翅足桃仁二十箇去皮尖大黃三两酒浸右四味為末以水五升煮取三升去滓温服一升婦人經水閉不利藏堅癖不止中有乾血下白物礬石丸主之礬石丸方礬石三分燒杏仁一分右二味末之煉蜜和丸棗核大内藏中劇者再内之婦人六十二種風及腹中血氣刺痛紅藍花酒主之紅藍花酒方疑非仲景方紅藍花一两右一味以酒一大升煎减半頓服一半未止再服婦人腹中諸疾痛當歸芍藥散主之當歸芍藥散方見前姙娠中婦人腹中痛小建中湯主之小建中湯方見前虚劳中問曰婦人病飲食如故煩熱不得卧而反倚息者何也師曰此名轉胞不得溺也以胞絲了戾故致此病但利小便則愈冝腎氣丸主之腎氣丸方乾地黄八两署蕷四两山茱茰四两澤瀉茯苓三两牡丹皮三两桂枝附子炮各一两右八味末之煉蜜和丸梧子大酒下十五丸加至二十五丸日再服蛇床子散方温隂中坐藥蛇床子仁右一味末之以白粉少許和令相得如棗大綿褁内之自然温少隂脉滑而數者隂中即生瘡隂中蝕瘡爛者狼牙湯洗之狼牙湯方狼牙三两右一味以水四升煮取半升以綿纏筯如繭浸湯瀝隂中日四遍胃氣下泄隂吹而正喧此榖氣之實也膏髪煎導之膏髮煎方見黄疸中小兒疳䖝蝕齒方疑非仲景方雄黃葶藶右二味末之取臘日猪脂鎔以槐枝綿褁頭四五枚點藥烙之甘草少許分作三小帖毎小帖以水一升煮取七合温服再合爲一服重煮都成四服疑非仲景方長服訶梨勒丸方疑非仲景方訶梨勒燥陳皮厚朴各三两右三味末之煉蜜丸如梧子大酒飲服二十丸加至三十丸三物備急丸方見千金司空裴秀爲散用亦可先和成汁乃傾口中令從齒間得入至良驗大黄一两乾姜一两巴豆一两去皮心熬外研如脂右藥各湏精新先擣大黃乾姜爲末研巴豆内中合治一千杵用爲散蜜和丸亦加蜜器中貯之莫令歇主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口禁停尸卒死者以緩水若酒服大豆許三四丸或不下捧頭起灌令下咽湏臾當差如未差更與三丸當腹中鳴即吐下便差若口禁亦湏折齒灌之治傷寒令愈不復紫石寒食散方見千金翼紫石英白石英赤石脂鍾乳碓錬括蔞根防羊桔梗文蛤鬼臼各十分太一餘糧十分燒乾姜桂枝去皮四分右十三味杵為散酒服方寸匕救卒死方薤搗汁灌鼻中又方雄鷄冠割取血管吹内鼻中猪脂如鷄子大苦酒一升煮沸灌喉中鷄肝及血塗面上以灰圍四旁立起大豆二七粒以鷄子白幷酒和盡以吞之救卒死而壮熱者方礬石半斤以水壹斗半煮消以漬脚令没踝救卒死而目閉者方騎牛臨面搗薤汁灌耳中吹皂莢末鼻中立効救卒死而張口反折者方灸手足两瓜後十四壮了飲以五毒諸膏散救卒死而四肢不收失便者方馬屎一升水三斗煮取二斗以洗之又取牛洞稀糞也一升温酒灌口中灸心下一寸臍上三寸臍下四寸各一百壮差救小兒卒死而吐利不知是何病方狗屎一丸絞取汁以灌之無濕者水煮乾者取汁尸蹷脉動而無氣氣閉不通故静而死也治方脉証見上卷菖蒲屑内鼻两孔中吹之令人以桂屑着舌下又方取左角髪方寸燒末酒和灌令入喉立起救卒死客忤死還魂湯主之方千金方云主卒忤鬼擊飛尸諸奄忽氣絶無復覺或以死脉口禁抝不開去齒下湯湯下口不下者分病人髪左右捉㩉肩引之藥下復者取一升湏臾立甦麻黃三两去節一方四两杏仁去皮尖七十箇甘草一两炙千金用桂心二两右三味以水八升煮取三升去滓分令咽之通冶諸感忤又方韭根一把烏梅二七箇吴茱茰半升炒右三味以水一斗煮之以病人櫛内中三沸􅌨浮者生沉者死煮取三升去滓分飲之救自縊死旦至暮雖巳冷必可治暮至旦少難也恐此當言忿氣盛故也然夏時夜短於晝又熱猶應可治又云心下苦㣲温者一日以上猶可治之方徐徐抱解不得截䋲上下安被卧之一人以脚踏其两肩手少挽其髪常弦弦勿縱之一人以手按據胸上數動之一人摩拌臂脛屈伸之若巳殭但漸漸强屈之幷按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦劳之湏臾可少桂湯及粥清含與之令濡喉漸漸能嚥及稍止若向令两人以管吹其两耳罙好此法最善無不活者凢中暍死不可使得冷得冷便死療之方屈草帶繞暍人臍使三两人溺其中令温亦可用熱泥和屈草亦可扣瓦椀底按及車缸以着暍人取令溺湏得流去此謂道路窮卒無湯當令溺其中𣣔使多人溺取令温若湯使可與之不可泥及車缸恐此物冷暍旣在夏月得熱泥土暖車缸亦可用也救溺死方取竈中灰两石餘以埋人從頭至足水出七孔即活右療自縊溺暍之法並出自張仲景為之其意殊絶殆非常情所及本草所能関實捄人之大術矣傷寒家數有暍病非此遇熱之暍見外䑓肘後治馬墜及一切筋骨損方見肘後方大黄一两切侵湯成下緋帛如手大燒灰亂髪如鷄子大燒灰用久用炊單布一尺燒灰敗蒲一握三寸桃仁四十九箇去皮尖熬甘草如中指節炙剉右七味以童子小便量多少煎湯成内酒一大盞次下大黄去滓分温三服先剉敗蒲席半領煎湯浴衣𬒳盖覆斯湏通利數行痛楚立差利及浴水赤勿怪即瘀血也禽獸魚䖝禁忌幷冶第二十四論辯二首合九十法方二十一首凢飲食滋味以養於生食之有妨反能為害自非服藥煉液焉能不飲食乎切見時人不閑調攝疾疢競起若不因食而生苟全其生湏知切忌者矣所食之味有與病相冝有與身為害若得冝則益體害則成疾以此致危例皆難療凢煮藥飲汁以解毒者雖云救急不可熱更甚宜冷飲之肝病禁辛心病禁鹹脾病禁酸肺病禁苦腎病禁甘春不食肝夏不食心秋不食肺冬不食腎四季不食脾辯曰春不食肝者爲肝氣王脾氣敗若食肝則又𥙷肝脾氣反尤甚不可救又肝王之時不可以死氣入肝恐傷䰟也若非王時即虚以肝𥙷之佳余藏凖此凢肝臟自不可輕噉自死者弥甚凢心皆爲神識所舎切食之使人来生復其報對矣凢肉及肝落地不着塵土者不可食之猪肉落水浮者不可食諸肉及魚若狗不食鳥不啄者不可食諸肉不乾火炙不動見水自動者不可食之肉中有如朱點者不可食之六畜肉熱血不斷者不可食之父母及身本命肉食之令人神䰟不安食肥肉及熱羔不得飲冷水諸五藏及魚投地塵上不汚者不可食之穢飯餒肉臭魚食之皆傷人自死肉口閉者不可食之六畜自死皆疫死則有毒不可食之獸自死北首及伏地者食之殺人食生肉飽飲乳變成白虫一作血蠱疫死牛肉食之令病洞下亦致堅積冝利藥下之脯臟米甕中有毒及經夏食之發腎病治自死六畜肉中毒方黄蘗屑搗服方寸匕治食欝肉漏脯中毒方欎肉宻器盖之隔宿者是也漏脯茅屋漏下沾着者是也燒犬屎酒服方寸匕每服人乳汁亦良飲生韭汁三升亦得冶黍米中藏乾脯食之中毒方大豆濃煮汁飲數升即解亦治狸肉漏脯等毒治食生肉中毒方掘地深三尺取其下土三升以水五升煮數沸澄清汁飲一升即愈治六畜鳥獸肝中毒方水浸豆豉絞取汁服數升愈馬脚無夜眼者不可食之食酸馬肉不飲酒則殺人馬肉不可熱食傷人心馬鞍下肉食之殺人白馬黒頭者不可食之白馬青蹄者不可食之馬肉㹠肉共食飽醉卧大忌驢馬肉合猪肉食之成霍亂馬肝及尾不可妄食中毒害人治馬肝毒中人未死方雄䑕屎二七粒求之水和服日再服屎尖者是又方人垢取方寸匕服之佳治食馬肉中毒𣣔死方香豉二两杏仁三两右二味蒸一食頃熟杵之服日再服又方煮蘆根汁飲之良疫死牛或目赤或黃食之大忌牛肉共猪肉食之必作寸白虫青牛腸不可合犬肉食之牛肺從三月至五月其中有虫如馬尾割去勿食食則損人牛羊猪肉皆不得以楮木桑木蒸炙食之令人腹内生虫噉蛇牛肉殺人何以知之噉蛇者毛髮向後順者是也治噉蛇牛肉食之𣣔死方飲人乳汁一升立愈又方以泔洗頭飲一升愈牛肚細切以水一斗煮取一升煖飲之大汗岀者愈治食牛肉中毒方甘草煮汁飲之即解羊肉其有宿熱者不可食之羊肉不可共生魚酪食之害人羊蹄甲中有珠子白者名羊懸筋食之令人癲白羊黒頭食其腦作腸癰羊肝共生椒食之破人五藏猪肉共羊肝和食之令人心悶猪肉以胡荽同食爛人臍猪脂不可合梅子食之猪肉和葵食之少氣鹿人不可和蒲白作羔食之發惡瘡麋脂及梅李子若姙婦食之令子青肓男子傷精麞肉不可合煆及生菜梅李果食之皆病人痼疾人不可食熊肉令終身不愈白犬自死不出舌者食之害人食狗䑕餘令人發瘘瘡治食犬肉不消心下堅或腹脹口乾大渴心急發熱妄語如狂或洞下方杏仁一升合皮熟研用右以沸湯三升和取汁分三服利下肉片大驗婦人姙娠不可食兎肉山羊肉及鱉雞鴨令子無聲音兔肉不可合白雞肉食之令人面發黄兎肉着乾姜食之成霍亂凢鳥自死口不閉翅不合者不可食之諸禽肉肝青者食之殺人雞有六翮四距者不可食之烏雞白首者不可食之雞不可共葫蒜食之滯氣一云雞子山雞不可合鳥獸肉食之雉肉乆食之令人瘦鴨夘不可合鱉肉食之婦人姙娠食雀肉令子淫亂無恥雀肉不可合李子食之燕肉勿食入水為蛟龍所噉鳥獸有中毒箭死者其肉有毒解之方大豆煮汁及塩汁服之解魚頭正白如連珠至脊上食之殺人魚頭中無腮者不可食食之殺人魚無腸膽者不可食食之三年隂不起女子絶生魚頭似有角者不可食之魚目合者不可食之六甲日勿食鱗甲之物魚不可合雞肉食之魚不得合鸕鷀肉食之鯉魚鮓不可合小豆藿食之其子不可合猪肝食之害人鯉魚不可合犬肉食之鯽魚不可合猴雉肉食之一云不可合猪肝食鯷魚合鹿肉生食令人筋甲縮青魚鮓不可合生葫荽及生葵并麥中食之鰌鱔不可合白犬血食之龜肉不可合酒果子食之鱉目四陷者及厭下有王字形者不可食之其肉不得合雞鴨子食之龜鱉肉不可合莧菜食之鰕無鬚及腹下通黒煮之反白者不可食之食膾飲乳酪令人腹中生虫爲瘕鱠食之在心胸間不化吐復不岀速下除之久成癥病治之方橘皮一两大黃二两朴消二两右三味以水一大升煮至小升頓服即消食鱠多不消結爲癥病治之方馬鞭草右一味搗汁飲之或以姜葉汁飲之一升亦消又可服吐藥吐之食魚後食毒两種煩亂治之方橘皮右濃煎汁服之即解食鯸鮧魚中毒方蘆根右煮汁服之即解蠏月相向足班目赤者不可食之食蠏中毒治之方紫蘇右煮汁飲之三升紫蘇子搗汁飲之亦良又方冬瓜汁飲二升食冬瓜亦可凢蠏未遇霜多毒其熟者乃可食之蜘蛛落食中有毒勿食之凢蜂蠅䖝蟻等多集食上食之致瘘菓實菜糓禁忌幷治第二十五果子生食生瘡果子落地經宿䖝蟻食之者人大忌食之生米停留多日有損處食之傷人桃子多食令人熱仍不得入水浴令人病淋瀝寒熱病杏酪不熟傷人梅多食壊人齒李不可多食令臚脹林檎不可多食令人百脉弱橘柚多食令人口爽不知五味梨不可多食令人寒中金瘡産婦亦不冝食之櫻桃杏多食傷筋骨安石榴不可多食損人肺胡桃不可多食令人動疾飲生棗多食令人熱渴氣脹寒熱羸瘦者弥不可食傷人食諸果中毒治之方猪骨右一味末之水服方寸匕亦治馬肝漏脯等毒木耳赤色及仰生者勿食菌仰卷及赤色者不可食食諸菌中毒悶亂𣣔死冶之方人糞汁飲一升土漿飲一二升大豆濃煮汁飲之服諸吐利藥並解食楓柱菌而哭不止治之以前方誤食野芋煩毒𣣔死治之方以前方其野芋根山東人名魁芋人種芋三年不收亦成野芋並殺人蜀椒閉口者有毒誤食之㦸人咽喉氣病𣣔絶或吐下白沫身體痺冷急治之方肉桂煎汁飲之或食蒜或飲地漿或濃煮豉汁飲之並解正月勿食生葱令人面生游風二月勿食蓼傷人腎三月勿食小蒜傷人志性四月八月勿食胡荽傷人神五月勿食韭令人乏氣力五月五日勿食一切生菜發百病六月七月勿食茱茰傷神氣八月九月勿食姜傷人神十月勿食損人心傷心脉十一月十二月勿食薤令人多涕唾四季勿食生葵令人飲食不化發日病非但食中藥中皆不可用深冝慎之時病差未徤食生菜手足必腫夜食生菜不利人十月勿食𬒳霜生菜令人面無光目澁心痛腰疼或發心瘧瘧發時手足十指爪皆青困委葱韭初生芽者食之傷人心氣飲白酒食生韭令人病増生葱不可共蜜食之殺人獨顆蒜弥忌棗合生葱食之令人病生葱和雄雞雉大肉食之令人七竅經年流血食糖蜜後四日内食生葱蒜令人心痛夜食諸姜蒜葱等傷人心蕪菁根多食令人氣脹薤不可共牛肉作羔食之成瘕病韭亦然蓴多病動痔疾野苣不可同蜜食之作内痔白苣不可共酪同食作􅉶虫黄瓜食之發熱病葵心不可食傷人葉尤冷黄背赤莖者勿食之胡荽乆食之令人多忘病人不可食胡荽及黃花菜芋不可多食動病姙婦食姜令子餘指蓼多食發心痛蓼和生魚食之令人奪氣隂欬疼痛芥菜不可共兎肉食之成惡邪病小蒜多食傷人心力食躁或躁方豉右濃煮汁飲之釣吻與芹菜相佀誤食之殺人解之方肘後云與茱茰食芥相佀薺苨八两右一味水六升煮取二升分温二服釣吻生地仿他草其莖有毛者以此别之菜中有水莨菪葉圓而先有毒誤食之令人狂亂狀如中風或吐血治之方甘草右煮汁服之即解春秋二時龍帶精入芹菜中人偶食之為病發時手背腹滿痛不可忍各蛟龍病治之方硬糖二三升右一味日两度服之吐出如蜥蝪三五枚食苦瓜中毒治之方黎穣右煮汁數服之解扁豆寒熱者不可食之久食小豆令人枯燥食大豆等忌噉猪肉大麥久食令人㿍白黍米不可同飴蜜食亦不可合葵食之荍麥麫多食之令人髮落塩多食傷人肺食冷物氷人齒食熱物勿飲冷水飲酒食生蒼耳令人心痛夏月大醉汗流不得冷水洗着身及使扇即成病飲酒大忌炙腹背令人腸結醉後勿飽食發寒熱飲酒食猪肉卧禾稻穰中則發黄食治多飲酒大忌凡水及酒照見人影動者不可飲之醋合酪食之令人血瘕食白米粥勿食生蒼耳成走疰食甜粥已食塩即吐犀角筋攪飲食沬出及澆地墳起者食之殺人飲食中毒煩滿治之方苦參三两苦酒一升半右二味煮三沸三上三下服之吐食出即差或以水煮亦得又方犀角湯亦佳貪食食多不消心腹堅滿痛治之方塩一升水三升右二味煮令塩消分三服當吐岀食便差礬石生入腹破人心肝亦禁水啇陸以水服殺人葶藶子傳頭瘡藥成入腦殺人水銀入人耳及六畜等皆死以金銀着耳邉水銀則吐苦練無子者殺人新編金匱要畧方論卷之下
